# Auto generated OpenClash config
# Output: output/lengkap.yaml

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: 0.0.0.0:7874
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fallback:
    - 1.0.0.1
    - 8.8.4.4

proxies:
  - name: "@DeamNet"
    server: 104.17.3.81
    port: 443
    type: vless
    uuid: @deamnet-@deamnet-@deamnet
    cipher: none
    tls: true
    skip-cert-verify: true
    network: ws
    servername: actually-road.bn-chanll.cf
    ws-opts:
      path: /deamnet
      headers:
        Host: actually-road.bn-chanll.cf
    udp: true

proxy-groups:
  - name: URL-TEST BN - Brunei
    type: url-test
    proxies:
      - "@DeamNet"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: PROXY
    type: select
    proxies:
      - URL-TEST BN - Brunei
      - DIRECT

rules:
  - MATCH,PROXY
