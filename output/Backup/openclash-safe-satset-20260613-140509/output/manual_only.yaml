port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
keep-alive-idle: 600
keep-alive-interval: 30
external-controller: 0.0.0.0:9090
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: 0.0.0.0:7874
  nameserver:
  - 1.1.1.1
  - 8.8.8.8
  fallback:
  - 1.0.0.1
  - 8.8.4.4
proxies:
- name: kurdconfig
  server: 104.17.3.81
  port: 443
  type: vless
  uuid: e6b418af-0ff1-4fe2-a079-8aaa0841781f
  cipher: none
  tls: true
  skip-cert-verify: true
  network: ws
  servername: cdn-n5.roxi.cc
  ws-opts:
    path: /lY4xhKGq8xGZL3CP2na2X60FJ
    headers:
      Host: cdn-n5.roxi.cc
  udp: true
proxy-groups:
- name: PROXY
  type: select
  proxies:
  - UTAMA
  - GOOGLE
  - YOUTUBE
  - REDDIT
  - LINKEDIN
  - BLIBLI
  - BANK
  - MARKETPLACE
  - SOCIAL
  - STREAMING
  - GAME
  - AI
  - WORK
  - DOWNLOAD
  - AUTO
  - FALLBACK
