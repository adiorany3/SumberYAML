# Default rule tambahan yang aman untuk semua output.
# Rule profil gaming/social/streaming/working/general dibuat otomatis oleh generator
# hanya jika group profilnya tersedia.

# LAN/private tetap direct.
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,224.0.0.0/4,DIRECT,no-resolve

# Domain lokal/router jangan lewat proxy.
- DOMAIN-SUFFIX,local,DIRECT
- DOMAIN-SUFFIX,localhost,DIRECT
- DOMAIN-SUFFIX,lan,DIRECT

# Iklan umum ringan. Hapus/baris komentari jika terlalu agresif.
- DOMAIN-SUFFIX,doubleclick.net,REJECT
- DOMAIN-SUFFIX,googlesyndication.com,REJECT
- DOMAIN-SUFFIX,googleadservices.com,REJECT
- DOMAIN-SUFFIX,ads-twitter.com,REJECT
- DOMAIN-KEYWORD,adservice,REJECT
