name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Sumber pemicu workflow: manual, streamlit, telegram, schedule"
        required: false
        default: "manual"
        type: string
      mode:
        description: "Mode proses"
        required: false
        default: "update"
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
          - build_stable
          - clear_quarantine
          - sanitize_import
          - optimize_openclash
          - purpose_groups
          - adblock
          - build_ready
          - diagnostics
          - rollback_latest_good
          - build_v2raybox
          - build_nekobox
      enable_proxy_test:
        description: "Jalankan test proxy/ping"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      filter_alive_only:
        description: "Filter output utama hanya proxy alive"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_alive_only:
        description: "Buat strict alive output"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: sumberyaml-update-openclash
  cancel-in-progress: false

env:
  TZ: Asia/Jakarta
  MODE: ${{ github.event.inputs.mode || 'update' }}
  SOURCE: ${{ github.event.inputs.source || 'schedule' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}

  # Stabilitas OpenClash/router/HP.
  BEST_PING_TOP_N: "10"
  BEST_PING_COUNTRY_FILTER: "ID"
  BEST_PING_SOURCE_LABEL: "Indonesia"
  BEST_PING_URL_TEST_NAME: "URL-TEST TOP 10 INDONESIA"
  URL_TEST_INTERVAL: "300"
  URL_TEST_TOLERANCE: "80"
  URL_TEST_LAZY: "true"
  RESPONSIVE_TOP_N: "20"
  RESPONSIVE_COMBINED_MAX: "40"

  # Strict alive dibuat longgar agar tidak membuang node yang sebenarnya masih usable.
  TEST_ROUNDS: "2"
  REQUIRE_SUCCESS_ROUNDS: "1"
  STRICT_MAX_DELAY_MS: "8000"

  # Cache/reuse sumber agar workflow tidak terlalu berat.
  SOURCE_CACHE_ENABLE: "true"
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: "true"

  # Manual account harus trusted.
  TRUSTED_MANUAL_INPUTS: "input/links.txt,input.txt"

jobs:
  build:
    name: Build OpenClash, sing-box, V2RayBox, NekoBox
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install pyyaml requests qrcode[pil] pillow

      - name: Prepare output directories
        run: |
          set -e
          mkdir -p \
            output \
            output/Alive \
            output/BestPing \
            output/Categories \
            output/Final \
            output/Health \
            output/Backup \
            output/RuleProviders \
            output/SingBox \
            output/V2RayBox \
            output/NekoBox \
            output/Validation \
            output/Source \
            output/Reuse

      - name: Show requested mode
        run: |
          echo "MODE=${MODE}"
          echo "SOURCE=${SOURCE}"
          echo "ENABLE_PROXY_TEST=${ENABLE_PROXY_TEST}"
          echo "FILTER_ALIVE_ONLY=${FILTER_ALIVE_ONLY}"
          echo "STRICT_ALIVE_ONLY=${STRICT_ALIVE_ONLY}"

      - name: Restore latest-good backup when requested
        if: ${{ github.event.inputs.mode == 'rollback_latest_good' }}
        run: |
          set -e
          if [ -f scripts/manage_latest_good_backup.py ]; then
            python scripts/manage_latest_good_backup.py --restore
          else
            echo "scripts/manage_latest_good_backup.py tidak ada, rollback dilewati."
          fi

      - name: Clear health quarantine when requested
        if: ${{ github.event.inputs.mode == 'clear_quarantine' }}
        run: |
          set -e
          if [ -f scripts/clear_health_quarantine.py ]; then
            python scripts/clear_health_quarantine.py
          else
            echo "scripts/clear_health_quarantine.py tidak ada, clear quarantine dilewati."
          fi

      - name: Generate OpenClash base outputs
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'update_ping' || github.event.inputs.mode == 'test' || github.event.inputs.mode == 'test_ping' }}
        run: |
          set -e
          echo "Generating base OpenClash output..."

          if [ -f scripts/telegram_openclash_alive.py ]; then
            python scripts/telegram_openclash_alive.py
          elif [ -f telegram_openclash_alive.py ]; then
            python telegram_openclash_alive.py
          elif [ -f scripts/generate_configs.py ]; then
            python scripts/generate_configs.py
          elif [ -f scripts/generate_configs_basic.py ]; then
            python scripts/generate_configs_basic.py
          else
            echo "::warning::Tidak menemukan generator utama. Step generate dilewati."
          fi

      - name: Fix generated YAML group references before validation
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'update_ping' || github.event.inputs.mode == 'test' || github.event.inputs.mode == 'test_ping' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'adblock' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/fix_yaml_group_refs.py ]; then
            python scripts/fix_yaml_group_refs.py
          else
            echo "scripts/fix_yaml_group_refs.py tidak ada, skip."
          fi

      - name: Validate generated OpenClash YAML before trusted manual merge
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'update_ping' || github.event.inputs.mode == 'test' || github.event.inputs.mode == 'test_ping' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'adblock' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py
          else
            echo "scripts/validate_openclash_outputs.py tidak ada, skip validation."
          fi

      - name: Merge trusted input links into OpenClash YAML
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'update_ping' || github.event.inputs.mode == 'test' || github.event.inputs.mode == 'test_ping' || github.event.inputs.mode == 'merge_links' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'adblock' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/merge_links_into_openclash_yaml.py ]; then
            python scripts/merge_links_into_openclash_yaml.py \
              --input input/links.txt \
              --also-input input.txt \
              --trusted || python scripts/merge_links_into_openclash_yaml.py
          else
            echo "scripts/merge_links_into_openclash_yaml.py tidak ada, skip merge YAML."
          fi

      - name: Apply OpenClash no-bengong optimization
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'adblock' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_no_bengong.py ]; then
            python scripts/apply_openclash_no_bengong.py \
              --max-stable 10 \
              --interval 300 \
              --tolerance 80 \
              --lazy || python scripts/apply_openclash_no_bengong.py
          else
            echo "scripts/apply_openclash_no_bengong.py tidak ada, skip."
          fi

      - name: Apply responsive OpenClash stability optimization
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py \
              --max-stable 10 \
              --interval 300 \
              --tolerance 80 \
              --lazy || python scripts/apply_openclash_responsive_stability.py
          else
            echo "scripts/apply_openclash_responsive_stability.py tidak ada, skip."
          fi

      - name: Add best-link group from trusted manual input
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'merge_links' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/add_best_link_group.py ]; then
            python scripts/add_best_link_group.py
          else
            echo "scripts/add_best_link_group.py tidak ada, skip."
          fi

      - name: Add fallback-link group from trusted manual input
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'merge_links' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/add_input_fallback_group.py ]; then
            python scripts/add_input_fallback_group.py
          else
            echo "scripts/add_input_fallback_group.py tidak ada, skip."
          fi

      - name: Apply purpose-specific OpenClash groups and rules
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_purpose_groups.py ]; then
            python scripts/apply_openclash_purpose_groups.py \
              --max-per-group 15 \
              --max-indonesia 20 \
              --tolerance 80 || python scripts/apply_openclash_purpose_groups.py
            cat output/Validation/summary_purpose_groups.json || true
          else
            echo "scripts/apply_openclash_purpose_groups.py tidak ada, skip."
          fi

      - name: Route Indonesian connections to best Indonesian proxy
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_indonesia_best_proxy.py ]; then
            python scripts/apply_openclash_indonesia_best_proxy.py --max-indonesia 10 || python scripts/apply_openclash_indonesia_best_proxy.py
            cat output/Validation/summary_indonesia_best_proxy.json || true
          else
            echo "scripts/apply_openclash_indonesia_best_proxy.py tidak ada, skip."
          fi

      - name: Convert OpenClash output and trusted input links to final sing-box JSON
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'update_ping' || github.event.inputs.mode == 'merge_links' || github.event.inputs.mode == 'build_stable' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/build_singbox_final.py ]; then
            python scripts/build_singbox_final.py \
              --link-input input/links.txt \
              --also-link-input input.txt \
              --strict-links || python scripts/build_singbox_final.py
          else
            if [ -f scripts/convert_openclash_to_singbox.py ]; then
              python scripts/convert_openclash_to_singbox.py \
                --also-new-dns \
                --also-legacy-tun \
                --make-latest || true
            fi
            if [ -f scripts/convert_links_to_singbox.py ]; then
              python scripts/convert_links_to_singbox.py --input input/links.txt --also-input input.txt || true
            fi
            if [ -f scripts/merge_links_into_singbox.py ]; then
              python scripts/merge_links_into_singbox.py --make-latest || true
            fi
          fi

      - name: Build best-stable and mobile-stable sing-box profiles
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_stable' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/build_best_stable.py ]; then
            python scripts/build_best_stable.py \
              --max-stable 10 \
              --max-mobile 10 \
              --max-fallback 15 \
              --keep-manual || python scripts/build_best_stable.py
          else
            echo "scripts/build_best_stable.py tidak ada, skip."
          fi

      - name: Apply sing-box mobile idle reconnect fix
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_stable' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/stabilize_singbox_mobile_idle.py ]; then
            python scripts/stabilize_singbox_mobile_idle.py \
              --dir output/SingBox \
              --test-url "https://www.gstatic.com/generate_204" \
              --interval 3m \
              --tolerance 80 \
              --idle-timeout 2h \
              --connect-timeout 15s || python scripts/stabilize_singbox_mobile_idle.py
          else
            echo "scripts/stabilize_singbox_mobile_idle.py tidak ada, skip."
          fi

      - name: Apply stable DNS fallback to sing-box JSON
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_stable' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/apply_dns_fallback_stable.py ]; then
            python scripts/apply_dns_fallback_stable.py
          else
            echo "scripts/apply_dns_fallback_stable.py tidak ada, skip."
          fi

      - name: Sanitize sing-box JSON for import compatibility
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/sanitize_singbox_import.py ]; then
            python scripts/sanitize_singbox_import.py \
              --dir output/SingBox \
              --keep-manual || python scripts/sanitize_singbox_import.py
          else
            echo "scripts/sanitize_singbox_import.py tidak ada, skip."
          fi

      - name: Enforce trusted manual accounts after sanitizer
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'merge_links' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/enforce_trusted_manual_accounts.py ]; then
            python scripts/enforce_trusted_manual_accounts.py \
              --links input/links.txt \
              --also-links input.txt || python scripts/enforce_trusted_manual_accounts.py
          else
            echo "scripts/enforce_trusted_manual_accounts.py tidak ada, skip."
          fi

      - name: Fix sing-box dependencies
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/fix_singbox_dependencies.py ]; then
            python scripts/fix_singbox_dependencies.py
          else
            echo "scripts/fix_singbox_dependencies.py tidak ada, skip."
          fi

      - name: Remove selector.default for legacy client compatibility
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/remove_selector_default_legacy.py ]; then
            python scripts/remove_selector_default_legacy.py
          else
            echo "scripts/remove_selector_default_legacy.py tidak ada, skip."
          fi

      - name: Convert TUN fields to modern sing-box format
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'sanitize_import' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/fix_tun_address_modern.py ]; then
            python scripts/fix_tun_address_modern.py
          else
            echo "scripts/fix_tun_address_modern.py tidak ada, skip."
          fi

      - name: Build final ready profiles
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/build_final_ready_profiles.py ]; then
            python scripts/build_final_ready_profiles.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}" || python scripts/build_final_ready_profiles.py
          else
            echo "scripts/build_final_ready_profiles.py tidak ada, skip."
          fi

      - name: Build V2RayBox outputs
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_v2raybox' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/build_v2raybox_outputs.py ]; then
            python scripts/build_v2raybox_outputs.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}" || python scripts/build_v2raybox_outputs.py
          else
            echo "scripts/build_v2raybox_outputs.py tidak ada, skip."
          fi

      - name: Build NekoBox outputs
        if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_nekobox' || github.event.inputs.mode == 'build_ready' }}
        run: |
          set -e
          if [ -f scripts/build_nekobox_outputs.py ]; then
            python scripts/build_nekobox_outputs.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}" || python scripts/build_nekobox_outputs.py
          else
            echo "scripts/build_nekobox_outputs.py tidak ada, skip."
          fi

      - name: Build diagnostics and score history
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'diagnostics' || github.event.inputs.mode == 'build_ready') }}
        run: |
          set -e
          if [ -f scripts/update_node_score_history.py ]; then
            python scripts/update_node_score_history.py || true
          fi
          if [ -f scripts/build_config_diff_report.py ]; then
            python scripts/build_config_diff_report.py || true
          fi
          if [ -f scripts/build_admin_diagnostic_summary.py ]; then
            python scripts/build_admin_diagnostic_summary.py || true
          fi

      - name: Force create adblock rule-provider files
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'adblock' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'build_ready') }}
        run: |
          set -e
          if [ -f scripts/create_rule_provider_files.py ]; then
            python scripts/create_rule_provider_files.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}"
          elif [ -f scripts/apply_openclash_youtube_adblock_provider.py ] || [ -f scripts/apply_openclash_general_adblock_provider.py ]; then
            if [ -f scripts/apply_openclash_youtube_adblock_provider.py ]; then
              python scripts/apply_openclash_youtube_adblock_provider.py \
                --repo "${{ github.repository }}" \
                --branch "${{ github.ref_name }}"
            fi
            if [ -f scripts/apply_openclash_general_adblock_provider.py ]; then
              python scripts/apply_openclash_general_adblock_provider.py \
                --repo "${{ github.repository }}" \
                --branch "${{ github.ref_name }}" \
                --provider-name general-ads \
                --url-source raw
            fi
          else
            echo "::warning::Tidak ada script pembuat rule provider. Membuat provider minimal bawaan."
            mkdir -p output/RuleProviders output/Validation
            cat > output/RuleProviders/youtube-ads.yaml <<'YAML'
          payload:
            - DOMAIN-SUFFIX,doubleclick.net
            - DOMAIN-SUFFIX,googleadservices.com
            - DOMAIN-SUFFIX,googlesyndication.com
            - DOMAIN-SUFFIX,google-analytics.com
            - DOMAIN-SUFFIX,ads.youtube.com
          YAML
            cat > output/RuleProviders/general-ads.yaml <<'YAML'
          payload:
            - DOMAIN-SUFFIX,doubleclick.net
            - DOMAIN-SUFFIX,googleadservices.com
            - DOMAIN-SUFFIX,googlesyndication.com
            - DOMAIN-SUFFIX,adservice.google.com
            - DOMAIN-SUFFIX,adsystem.com
            - DOMAIN-SUFFIX,adnxs.com
            - DOMAIN-SUFFIX,taboola.com
            - DOMAIN-SUFFIX,outbrain.com
            - DOMAIN-SUFFIX,criteo.com
            - DOMAIN-SUFFIX,pubmatic.com
            - DOMAIN-SUFFIX,openx.net
            - DOMAIN-SUFFIX,rubiconproject.com
            - DOMAIN-SUFFIX,scorecardresearch.com
          YAML
          fi

          echo "Rule provider files:"
          ls -la output/RuleProviders || true
          python - <<'PY'
          import json
          from pathlib import Path
          out = Path("output/Validation")
          out.mkdir(parents=True, exist_ok=True)
          files = sorted(str(p) for p in Path("output/RuleProviders").glob("*.yaml"))
          (out / "summary_rule_provider_files.json").write_text(
              json.dumps({"ok": True, "files": files}, indent=2),
              encoding="utf-8",
          )
          PY
          cat output/Validation/summary_rule_provider_files.json || true

      - name: Ensure adblock rule-providers in final OpenClash YAML
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'adblock' || github.event.inputs.mode == 'optimize_openclash' || github.event.inputs.mode == 'purpose_groups' || github.event.inputs.mode == 'build_ready') }}
        run: |
          set -e
          if [ -f scripts/ensure_openclash_rule_providers_final.py ]; then
            python scripts/ensure_openclash_rule_providers_final.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}"
          else
            echo "::warning::scripts/ensure_openclash_rule_providers_final.py tidak ada. Memasang provider minimal lewat inline Python."
            python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          
          repo = "${{ github.repository }}"
          branch = "${{ github.ref_name }}"
          provider_base = f"https://raw.githubusercontent.com/{repo}/{branch}/output/RuleProviders"
          
          targets = [
              "output/openclash-ready.yaml",
              "output/lengkap.yaml",
              "output/lengkap_alive.yaml",
              "output/strict_alive.yaml",
              "output/lite.yaml",
              "output/fast.yaml",
              "output/gaming.yaml",
              "output/social_media.yaml",
              "output/streaming.yaml",
              "output/working.yaml",
              "output/general.yaml",
          ]
          
          providers = {
              "youtube-ads": {
                  "type": "http",
                  "behavior": "classical",
                  "format": "yaml",
                  "path": "./rule_provider/youtube-ads.yaml",
                  "url": f"{provider_base}/youtube-ads.yaml",
                  "interval": 86400,
              },
              "general-ads": {
                  "type": "http",
                  "behavior": "classical",
                  "format": "yaml",
                  "path": "./rule_provider/general-ads.yaml",
                  "url": f"{provider_base}/general-ads.yaml",
                  "interval": 86400,
              },
          }
          
          wanted_rules = [
              "RULE-SET,youtube-ads,REJECT",
              "RULE-SET,general-ads,REJECT",
          ]
          
          summary = {}
          for name in targets:
              path = Path(name)
              if not path.exists():
                  continue
              try:
                  data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
                  if not isinstance(data, dict):
                      continue
                  rp = data.setdefault("rule-providers", {})
                  if not isinstance(rp, dict):
                      rp = {}
                      data["rule-providers"] = rp
                  rp.update(providers)
          
                  rules = data.get("rules") or []
                  if not isinstance(rules, list):
                      rules = []
                  rules = [r for r in rules if str(r) not in wanted_rules]
                  insert_at = 0
                  # taruh setelah rule LAN/DNS direct awal kalau ada.
                  while insert_at < len(rules):
                      s = str(rules[insert_at])
                      if "DIRECT" in s and (
                          s.startswith("DOMAIN-SUFFIX,local") or
                          s.startswith("DOMAIN-SUFFIX,lan") or
                          s.startswith("IP-CIDR,") or
                          s.startswith("DST-PORT,53")
                      ):
                          insert_at += 1
                      else:
                          break
                  for item in reversed(wanted_rules):
                      rules.insert(insert_at, item)
                  data["rules"] = rules
          
                  path.write_text(yaml.safe_dump(data, allow_unicode=True, sort_keys=False), encoding="utf-8")
                  summary[str(path)] = {"ok": True, "rules_added": wanted_rules}
              except Exception as exc:
                  summary[str(path)] = {"ok": False, "error": str(exc)}
          
          out = Path("output/Validation")
          out.mkdir(parents=True, exist_ok=True)
          (out / "summary_rule_providers_final.json").write_text(
              json.dumps(summary, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )
          PY
          fi

          echo "Rule provider final summary:"
          cat output/Validation/summary_rule_providers_final.json || true

      - name: Save latest-good backup after successful build
        if: ${{ success() && (github.event_name == 'schedule' || github.event.inputs.mode == 'update' || github.event.inputs.mode == 'build_ready') }}
        run: |
          set -e
          if [ -f scripts/manage_latest_good_backup.py ]; then
            python scripts/manage_latest_good_backup.py --save || true
          else
            mkdir -p output/Backup/latest-good
            cp -f output/openclash-ready.yaml output/Backup/latest-good/openclash-ready.yaml 2>/dev/null || true
            cp -f output/SingBox/import-ready.json output/Backup/latest-good/import-ready.json 2>/dev/null || true
            cp -f output/SingBox/mobile-stable-safe.json output/Backup/latest-good/mobile-stable-safe.json 2>/dev/null || true
          fi

      - name: List final outputs
        if: ${{ always() }}
        run: |
          echo "OpenClash outputs:"
          find output -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) -print | sort || true
          echo "Rule providers:"
          find output/RuleProviders -maxdepth 1 -type f -print | sort || true
          echo "Sing-box outputs:"
          find output/SingBox -maxdepth 1 -type f -name '*.json' -print | sort || true
          echo "V2RayBox outputs:"
          find output/V2RayBox -maxdepth 1 -type f -print | sort || true
          echo "NekoBox outputs:"
          find output/NekoBox -maxdepth 1 -type f -print | sort || true

      - name: Commit output files
        if: ${{ always() && github.event.inputs.mode != 'rollback_latest_good' || github.event.inputs.mode == 'rollback_latest_good' }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            output \
            input/links.txt \
            input.txt \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan untuk commit."
          else
            git commit -m "Update generated proxy outputs (${MODE}) [skip ci]"
            git push
          fi

      - name: Purge jsDelivr cache for published files
        if: ${{ success() }}
        run: |
          set +e
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          for path in \
            output/SingBox/mobile-stable-safe.json \
            output/SingBox/import-ready.json \
            output/SingBox/latest-safe.json \
            output/openclash-ready.yaml \
            output/V2RayBox/mobile-stable.txt \
            output/NekoBox/mobile-stable.txt \
            output/RuleProviders/youtube-ads.yaml \
            output/RuleProviders/general-ads.yaml
          do
            echo "Purging ${path}"
            curl -fsSL "https://purge.jsdelivr.net/gh/${REPO}@${BRANCH}/${path}" || true
          done

      - name: Notify Telegram
        if: ${{ always() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || secrets.TELEGRAM_ALLOWED_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets tidak tersedia, skip notify."
            exit 0
          fi

          TEXT="SumberYAML workflow selesai%0ARepo: ${{ github.repository }}%0AMode: ${MODE}%0AStatus: ${JOB_STATUS}%0ABranch: ${{ github.ref_name }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true" || true
