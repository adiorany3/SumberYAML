name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Sumber pemicu workflow
        required: false
        default: manual
        type: string
      mode:
        description: Mode proses
        required: false
        default: update
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
          - build_stable
          - clear_quarantine
          - sanitize_import
          - optimize_openclash
          - purpose_groups
          - adblock
          - security_block
          - youtube_ads_advanced
          - game_block
          - marketplace_protect
          - build_ready
          - diagnostics
          - rollback_latest_good
          - build_v2raybox
          - build_nekobox
      enable_proxy_test:
        description: Jalankan test proxy
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      filter_alive_only:
        description: Filter output hanya alive
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      strict_alive_only:
        description: Strict alive only
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      block_mode:
        description: Mode security/adblock OpenClash
        required: false
        default: standard
        type: choice
        options:
          - light
          - standard
          - aggressive
      youtube_ads_mode:
        description: Mode YouTube ads block
        required: false
        default: enhanced
        type: choice
        options:
          - safe
          - enhanced
          - aggressive
          - ultimate
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: update-openclash-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Jakarta
  PYTHONUNBUFFERED: '1'
  BEST_PING_COUNTRY_FILTER: ID
  BEST_PING_TOP_N: '10'
  BEST_PING_URL_TEST_NAME: URL-TEST TOP 10 INDONESIA
  URL_TEST_INTERVAL: '300'
  URL_TEST_TOLERANCE: '80'
  URL_TEST_LAZY: 'true'
  RESPONSIVE_TOP_N: '20'
  RESPONSIVE_COMBINED_MAX: '40'
  STRICT_MAX_DELAY_MS: '8000'
  TEST_ROUNDS: '2'
  REQUIRE_SUCCESS_ROUNDS: '1'
  SOURCE_CACHE_ENABLE: 'true'
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: 'true'
  YOUTUBE_ADS_MAX_RULES: '12000'
  SECURITY_BLOCK_MAX_GENERAL_ADS: '5000'
  SECURITY_BLOCK_MAX_ANDROID_ADS: '5000'
  SECURITY_BLOCK_MAX_MALWARE: '10000'

jobs:
  update-openclash:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install pyyaml requests qrcode[pil] pillow

      - name: Sync remote branch before build
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git merge --ff-only "origin/${GITHUB_REF_NAME}" || git merge -X ours --no-edit "origin/${GITHUB_REF_NAME}" || true

      - name: Prepare output folders
        run: |
          set -e
          mkdir -p output output/RuleProviders output/Validation output/SingBox output/V2RayBox output/NekoBox output/Final output/Health output/Backup

      - name: Generate OpenClash base outputs
        if: ${{ github.event_name == 'schedule' || contains(fromJSON('["update","update_ping","test","test_ping"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          MODE="${{ github.event.inputs.mode || 'update' }}"
          ENABLE_PROXY_TEST="${{ github.event.inputs.enable_proxy_test || 'true' }}"
          FILTER_ALIVE_ONLY="${{ github.event.inputs.filter_alive_only || 'true' }}"
          STRICT_ALIVE_ONLY="${{ github.event.inputs.strict_alive_only || 'true' }}"
          echo "mode=$MODE enable_proxy_test=$ENABLE_PROXY_TEST filter_alive_only=$FILTER_ALIVE_ONLY strict_alive_only=$STRICT_ALIVE_ONLY"

          if [ -f telegram_openclash_alive.py ]; then
            python telegram_openclash_alive.py || python telegram_openclash_alive.py --mode "$MODE" || true
          elif [ -f scripts/generate_configs.py ]; then
            python scripts/generate_configs.py || python scripts/generate_configs.py --mode "$MODE" || true
          elif [ -f scripts/generate_configs_basic.py ]; then
            python scripts/generate_configs_basic.py || true
          else
            echo "No base generator found; continuing with existing output files."
          fi

      - name: Fix YAML group references before validation
        run: |
          set -e
          if [ -f scripts/fix_yaml_group_refs.py ]; then
            python scripts/fix_yaml_group_refs.py
          fi

      - name: Validate OpenClash YAML outputs
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py
          else
            echo "validate_openclash_outputs.py not found; skipped."
          fi

      - name: Merge trusted input links into OpenClash YAML
        run: |
          set -e
          if [ -f scripts/merge_links_into_openclash_yaml.py ]; then
            python scripts/merge_links_into_openclash_yaml.py || true
          fi

      - name: Apply OpenClash responsive/no-bengong optimizations
        if: ${{ github.event_name == 'schedule' || !contains(fromJSON('["diagnostics","rollback_latest_good","build_v2raybox","build_nekobox"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --max-stable 10 || true
          fi
          if [ -f scripts/apply_openclash_no_bengong.py ]; then
            python scripts/apply_openclash_no_bengong.py --max-stable 10 || true
          fi
          if [ -f scripts/add_best_link_group.py ]; then
            python scripts/add_best_link_group.py || true
          fi
          if [ -f scripts/add_input_fallback_group.py ]; then
            python scripts/add_input_fallback_group.py || true
          fi
          if [ -f scripts/apply_openclash_indonesia_best_proxy.py ]; then
            python scripts/apply_openclash_indonesia_best_proxy.py --max-indonesia 10 || true
          fi
          if [ -f scripts/apply_openclash_purpose_groups.py ]; then
            python scripts/apply_openclash_purpose_groups.py --max-per-group 15 --max-indonesia 20 --tolerance 80 || true
          fi

      - name: Build adblock/security rule providers
        if: ${{ github.event_name == 'schedule' || contains(fromJSON('["update","adblock","security_block","youtube_ads_advanced","game_block","marketplace_protect"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          if [ -f scripts/create_rule_provider_files.py ]; then
            python scripts/create_rule_provider_files.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true
          fi
          if [ -f scripts/apply_openclash_general_adblock_provider.py ]; then
            python scripts/apply_openclash_general_adblock_provider.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true
          fi
          if [ -f scripts/apply_openclash_security_block_modes.py ]; then
            python scripts/apply_openclash_security_block_modes.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}" \
              --mode "${{ github.event.inputs.block_mode || 'standard' }}" || true
          fi
          if [ -f scripts/apply_goodbyeads_youtube_provider.py ]; then
            python scripts/apply_goodbyeads_youtube_provider.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true
          fi
          if [ -f scripts/apply_youtube_ads_advanced_provider.py ]; then
            python scripts/apply_youtube_ads_advanced_provider.py \
              --repo "${{ github.repository }}" \
              --branch "${{ github.ref_name }}" \
              --mode "${{ github.event.inputs.youtube_ads_mode || 'enhanced' }}" || true
          fi
          if [ -f scripts/apply_openclash_game_block_provider.py ]; then
            python scripts/apply_openclash_game_block_provider.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true
          fi

      - name: Build final sing-box JSON and related outputs
        if: ${{ github.event_name == 'schedule' || !contains(fromJSON('["diagnostics","rollback_latest_good"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          if [ -f scripts/build_singbox_final.py ]; then
            python scripts/build_singbox_final.py --link-input input/links.txt || true
          elif [ -f scripts/convert_openclash_to_singbox.py ]; then
            python scripts/convert_openclash_to_singbox.py --also-new-dns --also-legacy-tun --make-latest || true
          fi
          if [ -f scripts/convert_links_to_singbox.py ]; then
            python scripts/convert_links_to_singbox.py --input input/links.txt || true
            [ -f input.txt ] && python scripts/convert_links_to_singbox.py --input input.txt || true
          fi
          if [ -f scripts/merge_links_into_singbox.py ]; then
            python scripts/merge_links_into_singbox.py --make-latest || true
          fi
          if [ -f scripts/build_best_stable.py ]; then
            python scripts/build_best_stable.py || true
          fi
          if [ -f scripts/stabilize_singbox_mobile_idle.py ]; then
            python scripts/stabilize_singbox_mobile_idle.py --dir output/SingBox || true
          fi
          if [ -f scripts/apply_dns_fallback_stable.py ]; then
            python scripts/apply_dns_fallback_stable.py || true
          fi
          if [ -f scripts/sanitize_singbox_import.py ]; then
            python scripts/sanitize_singbox_import.py || true
          fi
          if [ -f scripts/enforce_trusted_manual_accounts.py ]; then
            python scripts/enforce_trusted_manual_accounts.py || true
          fi
          if [ -f scripts/fix_singbox_dependencies.py ]; then
            python scripts/fix_singbox_dependencies.py || true
          fi
          if [ -f scripts/remove_selector_default_legacy.py ]; then
            python scripts/remove_selector_default_legacy.py || true
          fi
          if [ -f scripts/fix_tun_address_modern.py ]; then
            python scripts/fix_tun_address_modern.py || true
          fi
          if [ -f scripts/build_final_ready_profiles.py ]; then
            python scripts/build_final_ready_profiles.py || true
          fi

      - name: Build V2RayBox and NekoBox outputs
        if: ${{ github.event_name == 'schedule' || contains(fromJSON('["update","build_v2raybox","build_nekobox"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          if [ -f scripts/build_v2raybox_outputs.py ]; then
            python scripts/build_v2raybox_outputs.py || true
          fi
          if [ -f scripts/build_nekobox_outputs.py ]; then
            python scripts/build_nekobox_outputs.py || true
          fi

      - name: Protect Shopee Live and Indonesian marketplaces from blocklists
        if: ${{ github.event_name == 'schedule' || !contains(fromJSON('["diagnostics","rollback_latest_good","build_v2raybox","build_nekobox"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          python scripts/apply_marketplace_protect_provider.py \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --url-source raw

          echo "Marketplace protect summary:"
          cat output/Validation/summary_marketplace_protect_provider.json || true

      - name: Ensure final rule-providers in OpenClash YAML
        if: ${{ github.event_name == 'schedule' || !contains(fromJSON('["diagnostics","rollback_latest_good","build_v2raybox","build_nekobox"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          if [ -f scripts/ensure_openclash_rule_providers_final.py ]; then
            python scripts/ensure_openclash_rule_providers_final.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true
          fi

      - name: Validate rule providers
        if: ${{ github.event_name == 'schedule' || contains(fromJSON('["update","adblock","security_block","youtube_ads_advanced","game_block","marketplace_protect"]'), github.event.inputs.mode || 'update') }}
        run: |
          set -e
          if [ -f scripts/validate_rule_providers.py ]; then
            python scripts/validate_rule_providers.py || true
          fi
          find output/RuleProviders -maxdepth 1 -type f -name '*.yaml' -print | sort || true

      - name: Build diagnostics and latest-good backup
        if: always()
        run: |
          set -e
          if [ -f scripts/build_config_diff_report.py ]; then
            python scripts/build_config_diff_report.py || true
          fi
          if [ -f scripts/update_node_score_history.py ]; then
            python scripts/update_node_score_history.py || true
          fi
          if [ -f scripts/build_admin_diagnostic_summary.py ]; then
            python scripts/build_admin_diagnostic_summary.py || true
          fi
          if [ -f scripts/manage_latest_good_backup.py ] && [ "${{ github.event.inputs.mode || 'update' }}" != "rollback_latest_good" ]; then
            python scripts/manage_latest_good_backup.py backup || true
          fi
          if [ -f scripts/manage_latest_good_backup.py ] && [ "${{ github.event.inputs.mode || 'update' }}" = "rollback_latest_good" ]; then
            python scripts/manage_latest_good_backup.py restore || true
          fi

      - name: Commit output files
        run: |
          set -e
          git status --short
          git add output .github/workflows/update-openclash.yml scripts || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update SumberYAML outputs, providers, and diagnostics"

      - name: Push with fetch/retry protection
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt"
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push rejected. Fetching and merging remote changes..."
            git fetch origin "${GITHUB_REF_NAME}"
            git merge -X ours --no-edit "origin/${GITHUB_REF_NAME}" || true
            sleep $((attempt * 3))
          done
          echo "Push failed after retries"
          exit 1

      - name: Purge jsDelivr cache
        if: always()
        run: |
          set +e
          for path in \
            output/SingBox/mobile-stable-safe.json \
            output/SingBox/import-ready.json \
            output/openclash-ready.yaml \
            output/V2RayBox/mobile-stable.txt \
            output/NekoBox/mobile-stable.txt \
            output/RuleProviders/marketplace-protect.yaml \
            output/RuleProviders/youtube-ads.yaml \
            output/RuleProviders/general-ads.yaml \
            output/RuleProviders/indonesia-ads.yaml \
            output/RuleProviders/android-ads.yaml \
            output/RuleProviders/malware-adware.yaml \
            output/RuleProviders/game-block.yaml; do
            curl -fsSL "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/$path" || true
          done

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not set; skip notification."
            exit 0
          fi
          STATUS="${{ job.status }}"
          TEXT="SumberYAML workflow selesai: ${STATUS}%0ARepo: ${{ github.repository }}%0AMode: ${{ github.event.inputs.mode || 'schedule/update' }}%0ABranch: ${{ github.ref_name }}"
          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true" || true
