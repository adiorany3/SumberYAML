name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Sumber pemicu workflow: manual, streamlit, telegram, schedule"
        required: false
        default: "manual"
        type: string
      mode:
        description: "Mode proses"
        required: false
        default: "update"
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - optimize_openclash
          - build_ready
          - performance_optimize
          - diagnostics
      enable_proxy_test:
        description: "Jalankan test proxy/ping"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      filter_alive_only:
        description: "Filter output utama hanya proxy alive"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_alive_only:
        description: "Buat strict alive output"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: openclash-update-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Jakarta
  PYTHONUNBUFFERED: "1"
  FORCE_OUTPUT_COMMIT: "true"
  MODE: ${{ github.event.inputs.mode || 'update' }}
  SOURCE: ${{ github.event.inputs.source || 'schedule' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}
  TEST_ROUNDS: "2"
  REQUIRE_SUCCESS_ROUNDS: "1"
  STRICT_MAX_DELAY_MS: "8000"
  TCP_FALLBACK: "true"
  DISABLE_TCP_ONLY_OUTPUT: "false"
  STRICT_FALLBACK_TO_ALIVE: "true"
  STRICT_FALLBACK_TO_VALID: "true"
  URL_TEST_INTERVAL: "90"
  URL_TEST_TOLERANCE: "40"
  URL_TEST_LAZY: "false"
  FILTER_MAX_DELAY_FOR_OUTPUT: "false"
  OPENCLASH_KEEP_META_OPTIONS: "false"
  OPENCLASH_ADD_LAN_DIRECT: "false"
  ENABLE_PERFORMANCE_OPTIONS: "false"
  MANUAL_INPUT_FILES: "input/links.txt,input.txt,links.txt,input/google.txt,input/oracle.txt,input/microsoft.txt,input/amazon.txt,input/digitalocean.txt,input/melbikom.txt,input/vultr.txt"
  PROVIDER_BUCKET_INPUT_FILES: "input/google.txt input/oracle.txt input/microsoft.txt input/amazon.txt input/digitalocean.txt input/melbikom.txt input/vultr.txt input/extra_sources_alive.txt input/provider_buckets_summary.json"
  MANUAL_SERVER_OVERRIDE: "104.17.3.81"
  MANUAL_SERVER_OVERRIDE_TYPES: "cdn-compatible"
  SMART_SAFE_MANUAL_ONLY: "true"
  DROP_PROXY_TYPES: "ss,ssr"
  DISABLE_EXTRA_SS_SSR_SCAN: "true"
  ENABLE_RULE_FOCUS: "false"
  ENABLE_SMART_QOS: "false"
  ENABLE_INPUT_VMESS_LB: "false"
  ENABLE_CLEAN_RESPONSIVE_RULES: "false"
  ENABLE_STRICT_SAFE_FIX: "false"
  ENABLE_APP_AWARE_GROUPS: "false"
  ENABLE_SERVICE_SCORE_GROUPS: "true"
  ENABLE_GAME_BLOCK_INLINE_SAFE: "true"
  ENABLE_EXTRA_SOURCES_ALIVE: "true"
  EXTRA_SOURCE_TCP_TIMEOUT: "4"
  EXTRA_SOURCE_CONCURRENCY: "120"
  EXTRA_SOURCE_MAX_CANDIDATES: "3000"
  EXTRA_SOURCE_MAX_ALIVE: "700"
  EXTRA_SOURCE_URLS: "https://raw.githubusercontent.com/hamedcode/port-based-v2ray-configs/main/sub/port_443.txt,https://raw.githubusercontent.com/barry-far/V2ray-Config/main/Sub1.txt,https://raw.githubusercontent.com/barry-far/V2ray-Config/main/All_Configs_Sub.txt,https://raw.githubusercontent.com/hamedcode/port-based-v2ray-configs/main/detailed/vless/443.txt,https://raw.githubusercontent.com/itsyebekhe/PSG/main/lite/subscriptions/xray/normal/mix,https://raw.githubusercontent.com/arshiacomplus/v2rayExtractor/refs/heads/main/mix/sub.html,https://raw.githubusercontent.com/Rayan-Config/C-Sub/refs/heads/main/configs/proxy.txt,https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/Eternity.txt,https://raw.githubusercontent.com/Everyday-VPN/Everyday-VPN/main/subscription/main.txt,https://raw.githubusercontent.com/MahsaNetConfigTopic/config/refs/heads/main/xray_final.txt,https://raw.githubusercontent.com/Epodonios/v2ray-configs/refs/heads/main/All_Configs_Sub.txt,https://raw.githubusercontent.com/barry-far/V2ray-config/main/Splitted-By-Protocol/vless.txt,https://raw.githubusercontent.com/barry-far/V2ray-config/main/Splitted-By-Protocol/trojan.txt,https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/main/vmess_configs.txt"
  APP_AWARE_INTERVAL: "90"
  APP_AWARE_TOLERANCE: "40"
  APP_AWARE_MAX_CANDIDATES: "20"
  SERVICE_SCORE_INTERVAL: "90"
  SERVICE_SCORE_TOLERANCE: "40"
  SERVICE_SCORE_MAX_CANDIDATES: "25"
  SERVICE_SCORE_TCP_PROBE: "true"
  SERVICE_SCORE_TCP_TIMEOUT: "2.5"
  SERVICE_SCORE_TCP_CONCURRENCY: "120"
  SERVICE_SCORE_CACHE: "cache/service_node_score.json"
  BLIBLI_INPUT_FILES: ".manual_source/input_links_original.txt,input.txt,links.txt"
  SOURCE_CACHE_ENABLE: "true"
  SOURCE_CACHE_DIR: "output/Cache/sources"
  USE_PREVIOUS_OUTPUT_IF_EMPTY: "true"
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: "true"
  PREVIOUS_OUTPUT_DIR: ".previous_output"
  BLACKLIST_FILE: "blacklist.txt"
  CUSTOM_RULES_FILE: "rules/custom_rules.yaml"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  update:
    name: Generate service-score OpenClash output with BLIBLI links-only
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests streamlit pyyaml
          fi

      - name: Backup previous output for fallback
        run: |
          set -e
          rm -rf .previous_output
          mkdir -p .previous_output
          if [ -d output ]; then
            cp -a output/. .previous_output/
            echo "Previous output backup file count:"
            find .previous_output -type f | wc -l
          fi

      - name: Backup original manual input for BLIBLI links-only policy
        run: |
          set -e
          rm -rf .manual_source
          mkdir -p .manual_source
          if [ -f input/links.txt ]; then
            cp input/links.txt .manual_source/input_links_original.txt
          else
            : > .manual_source/input_links_original.txt
          fi
          if [ -f input.txt ]; then
            cp input.txt .manual_source/input_root_original.txt
          fi
          if [ -f links.txt ]; then
            cp links.txt .manual_source/links_root_original.txt
          fi
          echo "Original BLIBLI manual source line count:"
          wc -l .manual_source/input_links_original.txt || true

      - name: Fetch extra sources and keep TCP-alive nodes
        if: env.ENABLE_EXTRA_SOURCES_ALIVE == 'true'
        run: |
          set -e
          if [ ! -f scripts/fetch_extra_sources_alive.py ]; then
            echo "ERROR: scripts/fetch_extra_sources_alive.py tidak ditemukan."
            exit 1
          fi
          python scripts/fetch_extra_sources_alive.py \
            --root . \
            --append-to input/links.txt \
            --provider-output-dir input \
            --provider-report .extra_sources_provider_buckets_report.json \
            --tcp-timeout "$EXTRA_SOURCE_TCP_TIMEOUT" \
            --concurrency "$EXTRA_SOURCE_CONCURRENCY" \
            --max-candidates "$EXTRA_SOURCE_MAX_CANDIDATES" \
            --max-alive "$EXTRA_SOURCE_MAX_ALIVE"
          cat .extra_sources_alive_report.json || true
          cat .extra_sources_provider_buckets_report.json || true
          if [ -f .extra_sources_provider_buckets_report.json ]; then
            cp .extra_sources_provider_buckets_report.json input/provider_buckets_summary.json
          fi
          echo "Alive extra source node count:"
          wc -l input/extra_sources_alive.txt || true
          echo "Provider bucket input files:"
          for f in input/google.txt input/oracle.txt input/microsoft.txt input/amazon.txt input/digitalocean.txt input/melbikom.txt input/vultr.txt; do
            printf '%s: ' "$f"
            if [ -f "$f" ]; then wc -l < "$f"; else echo 0; fi
          done

      - name: Generate OpenClash output
        run: |
          set -e
          if [ ! -f telegram_openclash_alive.py ]; then
            echo "ERROR: telegram_openclash_alive.py tidak ditemukan di root repository."
            exit 1
          fi
          python telegram_openclash_alive.py \
            --mode "$MODE" \
            --enable-proxy-test "$ENABLE_PROXY_TEST" \
            --filter-alive-only "$FILTER_ALIVE_ONLY" \
            --strict-alive-only "$STRICT_ALIVE_ONLY" \
            --test-rounds "$TEST_ROUNDS" \
            --require-success-rounds "$REQUIRE_SUCCESS_ROUNDS" || {
              echo "Gagal dengan argumen CLI. Coba fallback tanpa argumen."
              python telegram_openclash_alive.py
            }
          find output -maxdepth 3 -type f | sort || true
          if [ -f .extra_sources_alive_report.json ]; then
            mkdir -p output/Validation
            cp .extra_sources_alive_report.json output/Validation/extra_sources_alive_report.json
          fi
          if [ -f .extra_sources_provider_buckets_report.json ]; then
            mkdir -p output/Validation
            cp .extra_sources_provider_buckets_report.json output/Validation/extra_sources_provider_buckets_report.json
          fi

      - name: Apply smart-safe manual input and drop SS/SSR
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --root .
            cat output/Validation/smart_safe_report.json || true
          else
            echo "WARNING: smart-safe responsive script tidak ditemukan; lanjut."
          fi

      - name: Apply service-score app-aware groups with BLIBLI links-only
        if: env.ENABLE_SERVICE_SCORE_GROUPS == 'true'
        run: |
          set -e
          if [ ! -f scripts/apply_openclash_service_score_groups.py ]; then
            echo "ERROR: scripts/apply_openclash_service_score_groups.py tidak ditemukan."
            exit 1
          fi
          python scripts/apply_openclash_service_score_groups.py \
            --root . \
            --input-files "$MANUAL_INPUT_FILES" \
            --blibli-input-files "$BLIBLI_INPUT_FILES" \
            --interval "$SERVICE_SCORE_INTERVAL" \
            --tolerance "$SERVICE_SCORE_TOLERANCE" \
            --max-candidates "$SERVICE_SCORE_MAX_CANDIDATES" \
            --score-cache "$SERVICE_SCORE_CACHE" \
            --tcp-probe "$SERVICE_SCORE_TCP_PROBE" \
            --tcp-timeout "$SERVICE_SCORE_TCP_TIMEOUT" \
            --tcp-concurrency "$SERVICE_SCORE_TCP_CONCURRENCY"
          cat output/Validation/service_score_groups_report.json || true

      - name: Apply expanded inline-safe web game block rules
        if: env.ENABLE_GAME_BLOCK_INLINE_SAFE == 'true'
        run: |
          set -e
          if [ ! -f scripts/apply_openclash_game_block_inline_safe.py ]; then
            echo "ERROR: scripts/apply_openclash_game_block_inline_safe.py tidak ditemukan."
            exit 1
          fi
          python scripts/apply_openclash_game_block_inline_safe.py --root .
          cat output/Validation/game_block_inline_safe_report.json || true

      - name: Validate output exists
        run: |
          set -e
          if [ ! -f output/lengkap.yaml ]; then
            echo "ERROR: output/lengkap.yaml tidak ditemukan setelah generate."
            find output -maxdepth 4 -type f | sort || true
            exit 1
          fi
          test -f output/Validation/game_block_inline_safe_report.json
          if [ "$ENABLE_SERVICE_SCORE_GROUPS" = "true" ]; then
            test -f output/Validation/service_score_groups_report.json
          fi
          if [ "$ENABLE_EXTRA_SOURCES_ALIVE" = "true" ]; then
            test -f output/Validation/extra_sources_alive_report.json
            test -f output/Validation/extra_sources_provider_buckets_report.json
          fi
          wc -l output/lengkap.yaml || true

      - name: Validate OpenClash YAML
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py \
              output/lengkap.yaml \
              output/lengkap_alive.yaml \
              output/strict_alive.yaml \
              output/lite.yaml \
              output/fast.yaml \
              output/manual_only.yaml
          else
            python - <<'PY'
          import sys, yaml
          for p in sys.argv[1:]:
              try:
                  with open(p, 'r', encoding='utf-8') as f:
                      yaml.safe_load(f)
                  print('YAML OK:', p)
              except FileNotFoundError:
                  print('Skip missing:', p)
          PY
          fi

      - name: Validate expanded inline-safe game block
        if: env.ENABLE_GAME_BLOCK_INLINE_SAFE == 'true'
        run: |
          set -e
          python scripts/validate_game_block_inline_safe.py \
            --root . \
            output/lengkap.yaml \
            output/lengkap_alive.yaml \
            output/strict_alive.yaml \
            output/lite.yaml \
            output/fast.yaml \
            output/manual_only.yaml
          cat output/Validation/game_block_inline_safe_validation.json || true

      - name: Force output update marker
        if: env.FORCE_OUTPUT_COMMIT == 'true'
        run: |
          set -e
          if [ -f scripts/force_output_update_marker.py ]; then
            python scripts/force_output_update_marker.py --root .
          else
            mkdir -p output/Validation
            NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            NONCE="$(date -u +%s%N)-${GITHUB_RUN_ID:-run}-${GITHUB_RUN_ATTEMPT:-attempt}-$RANDOM"
            printf '{\n  "updated_at": "%s",\n  "nonce": "%s"\n}\n' "$NOW" "$NONCE" > output/Validation/last_run.json
            printf 'updated_at=%s\nnonce=%s\n' "$NOW" "$NONCE" > output/Validation/last_run.txt
          fi
          cat output/Validation/last_run.json || true

      - name: Assert latest output features
        run: |
          set -e
          if [ -f scripts/assert_latest_openclash_outputs.py ]; then
            python scripts/assert_latest_openclash_outputs.py --root . --strict || {
              echo "WARNING: strict assertion failed; continue because game block validator already passed."
            }
          fi
          grep -R "DOMAIN-SUFFIX,callofwar.com,BLOCK" output/*.yaml
          grep -R "DOMAIN-SUFFIX,poki.com,BLOCK" output/*.yaml
          grep -R "DOMAIN-SUFFIX,crazygames.com,BLOCK" output/*.yaml

      - name: Show generated output snapshot
        run: |
          set -e
          echo "Output YAML files:"
          find output -maxdepth 1 -type f -name "*.yaml" -printf "%f\n" | sort || true
          echo "Validation reports:"
          ls -la output/Validation || true
          echo "Extra sources alive summary:"
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('output/Validation/extra_sources_alive_report.json')
          if p.exists():
              d = json.loads(p.read_text())
              print({k: d.get(k) for k in ['unique_supported_candidates','checked_candidates','alive_candidates','dropped_ss_ssr','alive_by_scheme','provider_bucket_counts']})
          else:
              print('extra_sources_alive_report.json not found')
          p2 = pathlib.Path('output/Validation/extra_sources_provider_buckets_report.json')
          if p2.exists():
              d2 = json.loads(p2.read_text())
              print('provider files:', {k: v.get('count') for k, v in d2.get('files', {}).items()})
          else:
              print('extra_sources_provider_buckets_report.json not found')
          p3 = pathlib.Path('output/Validation/service_score_groups_report.json')
          if p3.exists():
              d3 = json.loads(p3.read_text())
              print('service score:', {k: d3.get(k) for k in ['tcp_probe_checked','tcp_probe_alive','blibli_links_only_names_count']})
          else:
              print('service_score_groups_report.json not found')
          PY
          echo "Provider bucket files:"
          for f in input/google.txt input/oracle.txt input/microsoft.txt input/amazon.txt input/digitalocean.txt input/melbikom.txt input/vultr.txt; do
            if [ -f "$f" ]; then echo "$f $(wc -l < "$f")"; fi
          done
          echo "Expanded web game block rules in fast.yaml:"
          grep -E "DOMAIN-SUFFIX,(callofwar|bytro|supremacy1914|conflictofnations|poki|crazygames|y8|krunker|roblox)" output/fast.yaml | head -120 || true
          echo "Ensure no unsupported provider/group types:"
          grep -R "RULE-SET,GAME-BLOCK" output/*.yaml && exit 1 || true
          grep -R "GAME-BLOCK-DOMAIN" output/*.yaml && exit 1 || true
          grep -R "GAME-BLOCK-CLASSICAL" output/*.yaml && exit 1 || true
          grep -R "type: load-balance" output/*.yaml && exit 1 || true
          grep -R "type: relay" output/*.yaml && exit 1 || true

      - name: Commit output files
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          BACKUP_DIR="$(mktemp -d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d output ]; then
            echo "ERROR: Folder output tidak ditemukan."
            exit 1
          fi

          tar -C output -cf "$BACKUP_DIR/output.tar" .
          if [ -d cache ]; then
            tar -C cache -cf "$BACKUP_DIR/cache.tar" .
          fi
          # Backup generated provider bucket input files only. Do not backup or commit input/links.txt,
          # because that file contains trusted/manual input and temporary appended extra-source nodes.
          mkdir -p "$BACKUP_DIR/provider_input"
          for f in $PROVIDER_BUCKET_INPUT_FILES; do
            if [ -f "$f" ]; then
              mkdir -p "$BACKUP_DIR/provider_input/$(dirname "$f")"
              cp "$f" "$BACKUP_DIR/provider_input/$f"
            fi
          done

          stage_provider_input_files() {
            for f in $PROVIDER_BUCKET_INPUT_FILES; do
              if [ -f "$f" ]; then
                git add -f "$f"
              fi
            done
          }

          stage_generated_paths() {
            git add -A -f output
            if [ -d cache ]; then
              git add -A -f cache
            else
              echo "Folder cache tidak ada, skip git add cache."
            fi
            stage_provider_input_files
          }

          write_force_marker() {
            mkdir -p output/Validation
            FORCE_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            FORCE_NONCE="$(date -u +%s%N)-${GITHUB_RUN_ID:-run}-${GITHUB_RUN_ATTEMPT:-attempt}-${GITHUB_RUN_NUMBER:-number}-$RANDOM"
            cat > output/Validation/last_run.json <<EOF
          {
            "updated_at": "$FORCE_TS",
            "nonce": "$FORCE_NONCE",
            "source": "$SOURCE",
            "mode": "$MODE",
            "run_id": "${GITHUB_RUN_ID:-}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT:-}",
            "policy": "force-output-commit-extra-sources-alive"
          }
          EOF
            cat > output/Validation/last_run.txt <<EOF
          updated_at=$FORCE_TS
          nonce=$FORCE_NONCE
          source=$SOURCE
          mode=$MODE
          policy=force-output-commit-extra-sources-alive
          EOF
          }

          for attempt in 1 2 3; do
            echo "Commit/push attempt $attempt untuk branch: $BRANCH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            rm -rf output cache
            mkdir -p output
            tar -C output -xf "$BACKUP_DIR/output.tar"
            if [ -f "$BACKUP_DIR/cache.tar" ]; then
              mkdir -p cache
              tar -C cache -xf "$BACKUP_DIR/cache.tar"
            fi
            if [ -d "$BACKUP_DIR/provider_input/input" ]; then
              mkdir -p input
              cp -a "$BACKUP_DIR/provider_input/input/." input/
            fi

            stage_generated_paths
            if git diff --cached --quiet; then
              echo "Tidak ada perubahan output dari generator. Membuat force marker agar update tetap ter-commit."
              write_force_marker
              stage_generated_paths
            fi

            git status --short output cache input/google.txt input/oracle.txt input/microsoft.txt input/amazon.txt input/digitalocean.txt input/melbikom.txt input/vultr.txt input/extra_sources_alive.txt input/provider_buckets_summary.json || true
            if git diff --cached --quiet; then
              echo "ERROR: Force output commit marker tetap tidak menghasilkan perubahan."
              exit 1
            fi

            git commit -m "Update OpenClash output with service score and Blibli links only"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push berhasil."
              exit 0
            fi
            echo "Push gagal, retry setelah sinkronisasi ulang."
            sleep $((attempt * 5))
          done

          echo "ERROR: Push tetap gagal setelah 3 percobaan."
          exit 1
