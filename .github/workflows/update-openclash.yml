name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Sumber pemicu workflow: manual, streamlit, telegram, schedule"
        required: false
        default: "manual"
        type: string
      mode:
        description: "Mode proses"
        required: false
        default: "update"
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - optimize_openclash
          - build_ready
          - performance_optimize
          - diagnostics
      enable_proxy_test:
        description: "Jalankan test proxy/ping"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      filter_alive_only:
        description: "Filter output utama hanya proxy alive"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_alive_only:
        description: "Buat strict alive output"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: openclash-update-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Jakarta
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

  # Paksa commit output setiap workflow update sukses, walaupun YAML utama identik.
  FORCE_OUTPUT_COMMIT: "true"
  FORCE_OUTPUT_MARKER_FILE: "output/Validation/last_run.json"

  MODE: ${{ github.event.inputs.mode || 'update' }}
  SOURCE: ${{ github.event.inputs.source || 'schedule' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}

  # Strict/alive tetap longgar agar akun manual/trusted tidak ikut terbuang.
  TEST_ROUNDS: "2"
  REQUIRE_SUCCESS_ROUNDS: "1"
  STRICT_MAX_DELAY_MS: "8000"
  STRICT_OUTPUT_FILE: "strict_alive.yaml"
  TCP_FALLBACK: "true"
  DISABLE_TCP_ONLY_OUTPUT: "false"
  STRICT_FALLBACK_TO_ALIVE: "true"
  STRICT_FALLBACK_TO_VALID: "true"

  # Sat-set aman untuk OpenClash lama: cepat, tapi tidak pakai timeout/lazy/tcp-concurrent/unified-delay.
  BEST_PING_TOP_N: "5"
  BEST_PING_COUNTRY_FILTER: "ID"
  BEST_PING_URL_TEST_NAME: "URL-TEST TOP 5 INDONESIA"
  URL_TEST_INTERVAL: "60"
  URL_TEST_TOLERANCE: "20"
  URL_TEST_LAZY: "false"
  MAX_DELAY_MS: "8000"
  FILTER_MAX_DELAY_FOR_OUTPUT: "false"

  RESPONSIVE_TOP_N: "15"
  RESPONSIVE_COMBINED_MAX: "30"
  RESPONSIVE_INTERVAL_FAST: "60"
  RESPONSIVE_FALLBACK_INTERVAL: "60"
  RESPONSIVE_TOLERANCE_FAST: "20"
  RESPONSIVE_INTERVAL_STABLE: "180"
  RESPONSIVE_STABLE_FALLBACK_INTERVAL: "180"
  RESPONSIVE_TOLERANCE_STABLE: "50"
  OPENCLASH_KEEP_META_OPTIONS: "false"
  OPENCLASH_ADD_LAN_DIRECT: "false"
  MANUAL_INPUT_FILES: "input/links.txt,input.txt,links.txt"
  # Paksa server hanya untuk akun manual CDN-compatible: vmess/vless/trojan + ws/grpc/h2/http.
  MANUAL_SERVER_OVERRIDE: "104.17.3.81"
  MANUAL_SERVER_OVERRIDE_TYPES: "cdn-compatible"
  SMART_SAFE_MANUAL_ONLY: "true"
  # SS/SSR dimatikan karena bisa membuat OpenClash gagal run pada beberapa core.
  DROP_PROXY_TYPES: "ss,ssr"
  SS_SSR_SERVER_OVERRIDE: ""
  DISABLE_EXTRA_SS_SSR_SCAN: "true"

  # Rule focus: pisahkan trafik website ke grup kategori agar node fokus sesuai situs yang diakses.
  ENABLE_RULE_FOCUS: "true"
  RULE_FOCUS_INTERVAL: "120"
  RULE_FOCUS_TOLERANCE: "50"
  RULE_FOCUS_MAX_CANDIDATES: "24"
  RULE_FOCUS_ADD_LAN_DIRECT: "false"
  RULE_FOCUS_ADD_GEOIP_ID: "false"

  # Smart QoS: routing berdasarkan prioritas trafik. Ini bukan SQM/CAKE bandwidth shaping.
  ENABLE_SMART_QOS: "true"
  SMART_QOS_INTERVAL: "90"
  SMART_QOS_TOLERANCE: "30"
  SMART_QOS_MAX_CANDIDATES: "24"
  SMART_QOS_ADD_LAN_BYPASS: "true"
  SMART_QOS_FORCE_MATCH_DEFAULT: "true"

  BLACKLIST_FILE: "blacklist.txt"
  SOURCE_CACHE_ENABLE: "true"
  SOURCE_CACHE_DIR: "output/Cache/sources"
  USE_PREVIOUS_OUTPUT_IF_EMPTY: "true"
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: "true"
  PREVIOUS_OUTPUT_DIR: ".previous_output"

  LITE_OUTPUT_FILE: "lite.yaml"
  LITE_GLOBAL_TOP_N: "10"
  LITE_MAX_TOTAL: "25"
  FAST_OUTPUT_FILE: "fast.yaml"
  FAST_MAX_TOTAL: "20"
  FAST_FALLBACK_NAME: "FALLBACK CEPAT"
  ENABLE_FAST_FALLBACK_GROUP: "true"
  ENABLE_PERFORMANCE_OPTIONS: "false"

  CUSTOM_RULES_FILE: "rules/custom_rules.yaml"
  RANK_TCP_FALLBACK_PENALTY: "300"
  RANK_GLOBAL_FALLBACK_PENALTY: "1000"
  RESPONSIVE_MAX_AVG_DELAY_MS: "8000"
  RESPONSIVE_MAX_JITTER_MS: "5000"
  RESPONSIVE_MIN_SUCCESS_RATE: "0.50"
  RESPONSIVE_JITTER_WEIGHT: "0.35"
  RESPONSIVE_FAILURE_PENALTY: "1500"

  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  update:
    name: Generate, repair, and commit OpenClash output
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Show debug info
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "Mode: $MODE"
          echo "Source: $SOURCE"
          echo "Enable proxy test: $ENABLE_PROXY_TEST"
          echo "Filter alive only: $FILTER_ALIVE_ONLY"
          echo "Strict alive only: $STRICT_ALIVE_ONLY"
          echo "Files in root:"
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests streamlit pyyaml
          fi

      - name: Backup previous output for fallback
        run: |
          set -e
          rm -rf .previous_output
          mkdir -p .previous_output
          if [ -d output ]; then
            echo "Backup output sebelumnya ke .previous_output"
            cp -a output/. .previous_output/
            echo "Jumlah file backup output sebelumnya:"
            find .previous_output -type f | wc -l
          else
            echo "Belum ada folder output sebelumnya. Fallback previous output tidak tersedia."
          fi

      - name: Generate OpenClash output
        run: |
          set -e
          if [ ! -f telegram_openclash_alive.py ]; then
            echo "ERROR: telegram_openclash_alive.py tidak ditemukan di root repository."
            echo "Pastikan semua file dari ZIP sudah diupload ke root repo."
            exit 1
          fi
          echo "Menjalankan telegram_openclash_alive.py..."
          python telegram_openclash_alive.py \
            --mode "$MODE" \
            --enable-proxy-test "$ENABLE_PROXY_TEST" \
            --filter-alive-only "$FILTER_ALIVE_ONLY" \
            --strict-alive-only "$STRICT_ALIVE_ONLY" \
            --test-rounds "$TEST_ROUNDS" \
            --require-success-rounds "$REQUIRE_SUCCESS_ROUNDS" || {
              echo "Gagal dengan argumen CLI. Coba fallback tanpa argumen..."
              python telegram_openclash_alive.py
            }
          echo "Output directory:"
          find output -maxdepth 3 -type f | sort || true

      - name: Apply smart-safe generator, manual-only output, and drop SS/SSR
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --root .
            echo "Smart-safe generator summary:"
            cat output/Validation/smart_safe_report.json || true
            echo "Text report:"
            cat output/report.txt || true
          else
            echo "ERROR: scripts/apply_openclash_responsive_stability.py tidak ditemukan."
            exit 1
          fi

      - name: Apply website category rule focus
        if: env.ENABLE_RULE_FOCUS == 'true'
        run: |
          set -e
          if [ -f scripts/apply_openclash_rule_focus.py ]; then
            python scripts/apply_openclash_rule_focus.py --root .
            echo "Rule-focus report:"
            cat output/Validation/rule_focus_report.json || true
          else
            echo "ERROR: scripts/apply_openclash_rule_focus.py tidak ditemukan."
            exit 1
          fi

      - name: Apply Smart QoS policy routing
        if: env.ENABLE_SMART_QOS == 'true'
        run: |
          set -e
          if [ -f scripts/apply_openclash_smart_qos.py ]; then
            python scripts/apply_openclash_smart_qos.py --root .
            echo "Smart-QoS report:"
            cat output/Validation/smart_qos_report.json || true
          else
            echo "ERROR: scripts/apply_openclash_smart_qos.py tidak ditemukan."
            exit 1
          fi

      - name: Validate output exists
        run: |
          set -e
          if [ ! -f output/lengkap.yaml ]; then
            echo "ERROR: output/lengkap.yaml tidak ditemukan setelah generate."
            echo "Isi folder output:"
            find output -maxdepth 4 -type f | sort || true
            exit 1
          fi
          echo "OK: output/lengkap.yaml ditemukan"
          wc -l output/lengkap.yaml || true

      - name: Validate OpenClash YAML
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py \
              output/lengkap.yaml \
              output/lengkap_alive.yaml \
              output/strict_alive.yaml \
              output/lite.yaml \
              output/fast.yaml || true
          fi
          python - <<'PY'
          from pathlib import Path
          import sys
          import json
          import yaml

          files = [
              Path('output/lengkap.yaml'),
              Path('output/lengkap_alive.yaml'),
              Path('output/strict_alive.yaml'),
              Path('output/lite.yaml'),
              Path('output/fast.yaml'),
              Path('output/manual_only.yaml'),
          ]
          failed = False
          for path in files:
              if not path.exists():
                  continue
              try:
                  data = yaml.safe_load(path.read_text(encoding='utf-8', errors='replace')) or {}
              except Exception as exc:
                  print(f'YAML parse failed: {path}: {exc}')
                  failed = True
                  continue
              proxies = data.get('proxies') or []
              groups = data.get('proxy-groups') or []
              proxy_names = {str(p.get('name')) for p in proxies if isinstance(p, dict) and p.get('name')}
              group_names = {str(g.get('name')) for g in groups if isinstance(g, dict) and g.get('name')}
              allowed = proxy_names | group_names | {'DIRECT', 'REJECT', 'PASS', 'COMPATIBLE'}
              for group in groups:
                  if not isinstance(group, dict):
                      continue
                  gname = str(group.get('name') or '')
                  for key in ('lazy', 'timeout'):
                      if key in group:
                          print(f'Risky group key still exists: {path}: {gname}: {key}')
                          failed = True
                  for ref in group.get('proxies') or []:
                      ref = str(ref)
                      if ref == gname or ref not in allowed:
                          print(f'Invalid proxy-group reference: {path}: {gname} -> {ref}')
                          failed = True
              target_server = '104.17.3.81'
              for proxy in proxies:
                  if not isinstance(proxy, dict):
                      continue
                  ptype = str(proxy.get('type') or '').lower()
                  pname = str(proxy.get('name') or '')
                  if ptype in {'ss', 'ssr'}:
                      print(f'SS/SSR proxy type must not exist in OpenClash-safe output: {path}: {proxy.get("name")}')
                      failed = True
          # Manual-link groups are expected only when direct proxy URIs were successfully parsed.
          manual_templates_loaded = 0
          summary_path = Path('output/Validation/smart_safe_report.json')
          if summary_path.exists():
              try:
                  manual_templates_loaded = int((json.loads(summary_path.read_text(encoding='utf-8')).get('total_injected_templates_loaded') or 0))
              except Exception:
                  manual_templates_loaded = 0
          if manual_templates_loaded > 0:
              for path in files:
                  if not path.exists():
                      continue
                  data = yaml.safe_load(path.read_text(encoding='utf-8', errors='replace')) or {}
                  group_names = {str(g.get('name')) for g in (data.get('proxy-groups') or []) if isinstance(g, dict)}
                  if {'MANUAL-LINK', 'MANUAL-FALLBACK'} - group_names:
                      print(f'Manual fallback groups missing in {path}')
                      failed = True
          if failed:
              sys.exit(1)
          print('Fallback YAML validation OK')
          PY

      - name: Force output update marker
        if: env.FORCE_OUTPUT_COMMIT == 'true'
        run: |
          set -e
          if [ -f scripts/force_output_update_marker.py ]; then
            python scripts/force_output_update_marker.py --root .
          else
            echo "WARNING: scripts/force_output_update_marker.py tidak ditemukan. Membuat marker fallback."
            mkdir -p output/Validation
            FORCE_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf '{"schema":"sumberyaml.force-output-update.fallback.v1","generated_at_utc":"%s","github_run_id":"%s","github_run_attempt":"%s","github_run_number":"%s","github_sha":"%s","mode":"%s","source":"%s"}\n' "$FORCE_TS" "${GITHUB_RUN_ID:-}" "${GITHUB_RUN_ATTEMPT:-}" "${GITHUB_RUN_NUMBER:-}" "${GITHUB_SHA:-}" "${MODE:-update}" "${SOURCE:-}" > output/Validation/last_run.json
            printf 'forced_update=%s\nrun_id=%s\nsha=%s\n' "$FORCE_TS" "${GITHUB_RUN_ID:-}" "${GITHUB_SHA:-}" > output/Validation/last_run.txt
          fi
          echo "Last run marker:"
          cat output/Validation/last_run.json || true

      - name: Commit output files
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          BACKUP_DIR="$(mktemp -d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -d output ]; then
            echo "Folder output tidak ditemukan, tidak ada yang di-commit."
            exit 0
          fi
          echo "Backup output hasil generate ke folder sementara..."
          tar -C output -cf "$BACKUP_DIR/output.tar" .
          for attempt in 1 2 3; do
            echo "Commit/push attempt $attempt untuk branch: $BRANCH"
            git fetch origin "$BRANCH" || true
            git checkout "$BRANCH" || git checkout -B "$BRANCH" "origin/$BRANCH" || true
            git reset --hard "origin/$BRANCH" || true
            git clean -fd || true
            echo "Restore output hasil generate ke working tree terbaru..."
            rm -rf output
            mkdir -p output
            tar -C output -xf "$BACKUP_DIR/output.tar"
            git add output cache || true
            if git diff --cached --quiet; then
              echo "Tidak ada perubahan output dari generator. Membuat force marker agar update tetap ter-commit."
              mkdir -p output/Validation
              if [ -f scripts/force_output_update_marker.py ]; then
                python scripts/force_output_update_marker.py --root .
              else
                FORCE_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                printf '{"schema":"sumberyaml.force-output-update.commit-fallback.v1","generated_at_utc":"%s","github_run_id":"%s","github_run_attempt":"%s","github_run_number":"%s","github_sha":"%s","mode":"%s","source":"%s"}\n' "$FORCE_TS" "${GITHUB_RUN_ID:-}" "${GITHUB_RUN_ATTEMPT:-}" "${GITHUB_RUN_NUMBER:-}" "${GITHUB_SHA:-}" "${MODE:-update}" "${SOURCE:-}" > output/Validation/last_run.json
                printf 'forced_commit_fallback=%s\nrun_id=%s\nsha=%s\n' "$FORCE_TS" "${GITHUB_RUN_ID:-}" "${GITHUB_SHA:-}" > output/Validation/last_run.txt
              fi
              git add output/Validation/last_run.json output/Validation/last_run.txt
            fi
            if git diff --cached --quiet; then
              echo "ERROR: Force output commit marker tetap tidak menghasilkan perubahan."
              exit 1
            fi
            git commit -m "Force update OpenClash output"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push berhasil."
              exit 0
            fi
            echo "Push gagal karena remote berubah. Ulangi dengan remote terbaru..."
            sleep 5
          done
          echo "Push tetap gagal setelah 3 percobaan."
          exit 1

      - name: Notify Telegram
        if: always()
        run: |
          if [ -f tools/telegram_notify.py ]; then
            if [ "${{ job.status }}" = "success" ]; then
              python tools/telegram_notify.py --stage success || true
            else
              python tools/telegram_notify.py --stage failure || true
            fi
          else
            echo "tools/telegram_notify.py tidak ditemukan, skip notify."
          fi
