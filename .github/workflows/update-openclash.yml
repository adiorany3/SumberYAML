name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Trigger source
        required: false
        default: manual
      mode:
        description: Run mode
        required: true
        default: update
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
          - build_stable
          - sanitize_import
          - optimize_openclash
      enable_proxy_test:
        description: Enable proxy alive/ping test
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      filter_alive_only:
        description: Filter generated automatic sources to alive only
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_alive_only:
        description: Use strict alive output when available
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: update-openclash-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install requests pyyaml qrcode[pil] pillow

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare output directories
        run: |
          mkdir -p output output/Validation output/SingBox output/Health output/BestPing output/Alive

      - name: Generate OpenClash YAML from automatic sources
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'merge_links' && github.event.inputs.mode != 'build_stable' && github.event.inputs.mode != 'optimize_openclash' }}
        env:
          MODE: ${{ github.event.inputs.mode || 'update' }}
          ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
          FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
          STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          if [ -f telegram_openclash_alive.py ]; then
            python telegram_openclash_alive.py
          elif [ -f scripts/generate_configs.py ]; then
            python scripts/generate_configs.py
          elif [ -f scripts/generate_configs_basic.py ]; then
            python scripts/generate_configs_basic.py
          else
            echo "No OpenClash generator found. Skipping automatic generation."
          fi

      - name: Fix generated YAML group references before validation
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'merge_links' && github.event.inputs.mode != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/fix_yaml_group_refs.py ]; then
            python scripts/fix_yaml_group_refs.py
          else
            echo "scripts/fix_yaml_group_refs.py not found; skipping."
          fi

      - name: Validate generated OpenClash YAML before trusted manual links
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'merge_links' && github.event.inputs.mode != 'build_stable' && github.event.inputs.mode != 'optimize_openclash' }}
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py
          else
            echo "scripts/validate_openclash_outputs.py not found; skipping validation."
          fi

      - name: Merge trusted input links into OpenClash YAML without filtering
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/merge_links_into_openclash_yaml.py ]; then
            python scripts/merge_links_into_openclash_yaml.py --input input/links.txt || python scripts/merge_links_into_openclash_yaml.py
          else
            echo "scripts/merge_links_into_openclash_yaml.py not found; skipping trusted YAML merge."
          fi

      - name: Apply responsive OpenClash YAML groups and DNS/rules
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --max-stable 10
            cat output/Validation/summary_openclash_responsive_stability.json || true
          else
            echo "scripts/apply_openclash_responsive_stability.py not found; skipping."
          fi

      - name: Add best-link/fallback-link compatibility groups when helper scripts exist
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/add_best_link_group.py ]; then
            python scripts/add_best_link_group.py || true
          fi
          if [ -f scripts/add_input_fallback_group.py ]; then
            python scripts/add_input_fallback_group.py || true
          fi

      - name: Build final sing-box JSON and merge trusted links
        if: ${{ github.event.inputs.mode != 'optimize_openclash' }}
        run: |
          set -e
          if [ -f scripts/build_singbox_final.py ]; then
            python scripts/build_singbox_final.py --link-input input/links.txt --strict-links || python scripts/build_singbox_final.py --link-input input.txt --strict-links || python scripts/build_singbox_final.py
          else
            if [ -f scripts/convert_openclash_to_singbox.py ]; then
              python scripts/convert_openclash_to_singbox.py --also-new-dns --also-legacy-tun --make-latest || python scripts/convert_openclash_to_singbox.py
            fi
            if [ -f scripts/convert_links_to_singbox.py ]; then
              python scripts/convert_links_to_singbox.py --input input/links.txt || python scripts/convert_links_to_singbox.py --input input.txt || true
            fi
            if [ -f scripts/merge_links_into_singbox.py ]; then
              python scripts/merge_links_into_singbox.py --make-latest || python scripts/merge_links_into_singbox.py || true
            fi
          fi

      - name: Build best stable/mobile stable profiles
        if: ${{ github.event.inputs.mode != 'optimize_openclash' }}
        run: |
          set -e
          if [ -f scripts/build_best_stable.py ]; then
            python scripts/build_best_stable.py || true
          else
            echo "scripts/build_best_stable.py not found; skipping."
          fi

      - name: Apply mobile reconnect, DNS fallback, and import compatibility fixes
        if: ${{ github.event.inputs.mode != 'optimize_openclash' }}
        run: |
          set -e
          for script in \
            scripts/stabilize_singbox_mobile_idle.py \
            scripts/apply_dns_fallback_stable.py \
            scripts/sanitize_singbox_import.py \
            scripts/fix_singbox_dependencies.py \
            scripts/remove_selector_default_legacy.py \
            scripts/fix_tun_address_modern.py \
            scripts/enforce_trusted_manual_accounts.py
          do
            if [ -f "$script" ]; then
              echo "Running $script"
              python "$script" || true
            else
              echo "$script not found; skipping."
            fi
          done

      - name: Re-apply trusted manual link groups after compatibility fixes
        if: ${{ github.event.inputs.mode != 'sanitize_import' && github.event.inputs.mode != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --max-stable 10
          fi
          if [ -f scripts/add_best_link_group.py ]; then
            python scripts/add_best_link_group.py || true
          fi
          if [ -f scripts/add_input_fallback_group.py ]; then
            python scripts/add_input_fallback_group.py || true
          fi

      - name: Purge jsDelivr cache for sing-box profiles
        if: always()
        run: |
          set +e
          if [ -d output/SingBox ]; then
            for file in output/SingBox/*.json; do
              [ -f "$file" ] || continue
              encoded_path="${file#./}"
              curl -fsSL "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/${encoded_path}" >/dev/null 2>&1 || true
            done
          fi

      - name: Show output summary
        if: always()
        run: |
          echo "YAML files:"
          find output -maxdepth 2 -type f -name '*.yaml' -print | sort || true
          echo "Sing-box JSON files:"
          find output/SingBox -maxdepth 1 -type f -name '*.json' -print | sort || true
          echo "Reports:"
          find output -maxdepth 3 -type f \( -name '*summary*.json' -o -name '*report*.json' \) -print | sort || true

      - name: Commit output files
        run: |
          set -e
          git add output input scripts .github/workflows/update-openclash.yml streamlit_app.py requirements.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update OpenClash and sing-box stable outputs"
            git push
          fi
