name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Trigger source
        required: false
        default: manual
      mode:
        description: Proses yang dijalankan
        required: false
        default: update
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
      enable_proxy_test:
        description: Jalankan test proxy/ping
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      filter_alive_only:
        description: lengkap.yaml hanya berisi proxy hidup
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_alive_only:
        description: Pakai hanya akun yang lolos URL delay test beberapa ronde
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: openclash-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

  MODE: ${{ github.event.inputs.mode || 'update' }}
  RUN_MODE: ${{ github.event.inputs.mode || 'update' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}

  TEST_ROUNDS: "2"
  REQUIRE_SUCCESS_ROUNDS: "1"
  STRICT_MAX_DELAY_MS: "8000"
  STRICT_OUTPUT_FILE: "strict_alive.yaml"
  TCP_FALLBACK: "true"
  DISABLE_TCP_ONLY_OUTPUT: "false"
  STRICT_FALLBACK_TO_ALIVE: "true"
  STRICT_FALLBACK_TO_VALID: "true"

  BEST_PING_TOP_N: "5"
  BEST_PING_COUNTRY_FILTER: "ID"
  BEST_PING_URL_TEST_NAME: "URL-TEST TOP 5 INDONESIA"
  BEST_PING_BALANCE_ENABLE: "true"

  URL_TEST_INTERVAL: "120"
  URL_TEST_TOLERANCE: "30"
  URL_TEST_LAZY: "false"
  MAX_DELAY_MS: "8000"
  FILTER_MAX_DELAY_FOR_OUTPUT: "false"
  ENABLE_COUNTRY_URL_TEST_GROUPS: "false"

  BLACKLIST_FILE: "blacklist.txt"
  SOURCE_CACHE_ENABLE: "true"
  SOURCE_CACHE_DIR: "output/Cache/sources"
  USE_PREVIOUS_OUTPUT_IF_EMPTY: "true"
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: "true"
  PREVIOUS_OUTPUT_DIR: ".previous_output"

  LITE_OUTPUT_FILE: "lite.yaml"
  LITE_GLOBAL_TOP_N: "10"
  LITE_MAX_TOTAL: "25"

  CUSTOM_RULES_FILE: "rules/custom_rules.yaml"
  DEFAULT_RULES_FILE: "rules/default_rules.yaml"
  PROFILE_RULES_FILE: "rules/profile_rules.yaml"
  ENABLE_USAGE_RULES: "true"
  ENABLE_DEFAULT_RULES: "true"
  ENABLE_PROFILE_RULES: "true"

  RANK_TCP_FALLBACK_PENALTY: "300"
  RANK_GLOBAL_FALLBACK_PENALTY: "1000"
  RESPONSIVE_MAX_AVG_DELAY_MS: "8000"
  RESPONSIVE_MAX_JITTER_MS: "5000"
  RESPONSIVE_MIN_SUCCESS_RATE: "0.50"
  RESPONSIVE_TOP_N: "15"
  RESPONSIVE_COMBINED_MAX: "30"
  RESPONSIVE_JITTER_WEIGHT: "0.35"
  RESPONSIVE_FAILURE_PENALTY: "1500"

  FAST_OUTPUT_FILE: "fast.yaml"
  FAST_MAX_TOTAL: "20"
  FAST_FALLBACK_NAME: "FALLBACK CEPAT"
  ENABLE_FAST_FALLBACK_GROUP: "true"
  ENABLE_PERFORMANCE_OPTIONS: "true"

  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  update:
    name: Generate, sanitize, convert sing-box, merge links, and commit output
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Show debug info
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "Branch: ${GITHUB_REF_NAME:-main}"
          echo "Mode: $MODE"
          echo "Enable proxy test: $ENABLE_PROXY_TEST"
          echo "Filter alive only: $FILTER_ALIVE_ONLY"
          echo "Strict alive only: $STRICT_ALIVE_ONLY"
          echo "Files in root:"
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install requests pyyaml qrcode[pil] pillow

      - name: Backup previous output for fallback
        run: |
          set -e
          rm -rf .previous_output
          mkdir -p .previous_output
          if [ -d output ]; then
            echo "Backup output sebelumnya ke .previous_output"
            cp -a output/. .previous_output/ || true
            echo "Jumlah file backup output sebelumnya:"
            find .previous_output -type f | wc -l
          else
            echo "Belum ada folder output sebelumnya. Fallback previous output tidak tersedia."
          fi

      - name: Generate OpenClash output
        if: ${{ env.MODE != 'merge_links' }}
        run: |
          set -e

          if [ -f telegram_openclash_alive.py ]; then
            echo "Menjalankan telegram_openclash_alive.py..."
            python telegram_openclash_alive.py \
              --mode "$MODE" \
              --enable-proxy-test "$ENABLE_PROXY_TEST" \
              --filter-alive-only "$FILTER_ALIVE_ONLY" \
              --strict-alive-only "$STRICT_ALIVE_ONLY" \
              --test-rounds "$TEST_ROUNDS" \
              --require-success-rounds "$REQUIRE_SUCCESS_ROUNDS" || {
                echo "Gagal dengan argumen CLI. Coba fallback tanpa argumen..."
                python telegram_openclash_alive.py
              }
          elif [ -f scripts/generate_configs.py ]; then
            echo "telegram_openclash_alive.py tidak ada. Fallback ke scripts/generate_configs.py..."
            RUN_MODE="$MODE" python scripts/generate_configs.py
          else
            echo "ERROR: generator tidak ditemukan. Butuh telegram_openclash_alive.py atau scripts/generate_configs.py."
            exit 1
          fi

          echo "Output directory:"
          find output -maxdepth 4 -type f | sort || true

      - name: Validate output/lengkap.yaml exists
        run: |
          set -e
          if [ ! -f output/lengkap.yaml ]; then
            echo "ERROR: output/lengkap.yaml tidak ditemukan."
            echo "Isi folder output:"
            find output -maxdepth 4 -type f | sort || true
            exit 1
          fi
          echo "OK: output/lengkap.yaml ditemukan"
          wc -l output/lengkap.yaml || true

      - name: Sanitize OpenClash group references
        run: |
          set -e
          if [ -f scripts/fix_yaml_group_refs.py ]; then
            python scripts/fix_yaml_group_refs.py
            echo "Group ref fix report:"
            cat output/Validation/group_ref_fix_report.json || true
          else
            echo "scripts/fix_yaml_group_refs.py tidak ditemukan. Lewati sanitasi group reference."
          fi

      - name: Validate OpenClash YAML outputs
        if: ${{ env.MODE != 'merge_links' }}
        run: |
          set -e
          if [ ! -f scripts/validate_openclash_outputs.py ]; then
            echo "scripts/validate_openclash_outputs.py tidak ditemukan. Lewati validasi."
            exit 0
          fi

          files=()
          for file in \
            output/lengkap.yaml \
            output/lengkap_alive.yaml \
            output/strict_alive.yaml \
            output/lite.yaml \
            output/fast.yaml \
            output/gaming.yaml \
            output/social_media.yaml \
            output/streaming.yaml \
            output/working.yaml \
            output/general.yaml
          do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Tidak ada file YAML untuk divalidasi."
            exit 1
          fi

          python scripts/validate_openclash_outputs.py "${files[@]}"

      - name: Build final sing-box JSON and merge input links
        run: |
          set -e
          mkdir -p output/SingBox

          if [ -f scripts/build_singbox_final.py ]; then
            python scripts/build_singbox_final.py \
              --link-input input/links.txt \
              --strict-links
          else
            echo "scripts/build_singbox_final.py tidak ditemukan. Pakai fallback manual."

            if [ -f scripts/convert_openclash_to_singbox.py ]; then
              python scripts/convert_openclash_to_singbox.py \
                --also-new-dns \
                --also-legacy-tun \
                --make-latest
            else
              echo "ERROR: scripts/convert_openclash_to_singbox.py tidak ditemukan."
              exit 1
            fi

            if [ -s input/links.txt ]; then
              if [ -f scripts/convert_links_to_singbox.py ]; then
                python scripts/convert_links_to_singbox.py \
                  --input input/links.txt \
                  --output-dir output/SingBox \
                  --strict
              fi

              if [ -f scripts/merge_links_into_singbox.py ]; then
                python scripts/merge_links_into_singbox.py \
                  --link-input input/links.txt \
                  --output-dir output/SingBox \
                  --make-latest \
                  --strict
              else
                echo "ERROR: scripts/merge_links_into_singbox.py tidak ditemukan."
                exit 1
              fi
            else
              echo "input/links.txt kosong/tidak ada. Merge links dilewati."
            fi
          fi

          echo "Sing-box output:"
          find output/SingBox -maxdepth 1 -type f -name '*.json' -print | sort || true

          echo "Merge summary:"
          cat output/SingBox/summary_merge_links_into_singbox.json || true

      - name: Commit output files
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          BACKUP_DIR="$(mktemp -d)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d output ]; then
            echo "Folder output tidak ditemukan, tidak ada yang di-commit."
            exit 0
          fi

          echo "Backup output hasil generate ke folder sementara..."
          tar -C output -cf "$BACKUP_DIR/output.tar" .

          for attempt in 1 2 3; do
            echo "Commit/push attempt $attempt untuk branch: $BRANCH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH" || git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd

            echo "Restore output hasil generate ke working tree terbaru..."
            rm -rf output
            mkdir -p output
            tar -C output -xf "$BACKUP_DIR/output.tar"

            git add output || true

            if git diff --cached --quiet; then
              echo "Tidak ada perubahan output untuk di-commit."
              exit 0
            fi

            git commit -m "Update OpenClash and sing-box output"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push berhasil."
              exit 0
            fi

            echo "Push gagal karena remote berubah. Ulangi dengan remote terbaru..."
            sleep 5
          done

          echo "Push tetap gagal setelah 3 percobaan."
          exit 1

      - name: Notify Telegram
        if: always()
        run: |
          if [ -f tools/telegram_notify.py ]; then
            if [ "${{ job.status }}" = "success" ]; then
              python tools/telegram_notify.py --stage success || true
            else
              python tools/telegram_notify.py --stage failure || true
            fi
          else
            echo "tools/telegram_notify.py tidak ditemukan, skip notify."
          fi
