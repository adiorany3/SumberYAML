name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Sumber pemicu workflow: manual, streamlit, telegram, schedule"
        required: false
        default: "manual"
        type: string
      mode:
        description: "Mode proses"
        required: false
        default: "update"
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - optimize_openclash
          - build_ready
          - performance_optimize
          - diagnostics
      enable_proxy_test:
        description: "Jalankan test proxy/ping"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      filter_alive_only:
        description: "Filter output utama hanya proxy alive"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_alive_only:
        description: "Buat strict alive output"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: openclash-update-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Jakarta
  PYTHONUNBUFFERED: "1"
  FORCE_OUTPUT_COMMIT: "true"
  MODE: ${{ github.event.inputs.mode || 'update' }}
  SOURCE: ${{ github.event.inputs.source || 'schedule' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}

  TEST_ROUNDS: "2"
  REQUIRE_SUCCESS_ROUNDS: "1"
  STRICT_MAX_DELAY_MS: "8000"
  TCP_FALLBACK: "true"
  DISABLE_TCP_ONLY_OUTPUT: "false"
  STRICT_FALLBACK_TO_ALIVE: "true"
  STRICT_FALLBACK_TO_VALID: "true"

  URL_TEST_INTERVAL: "90"
  URL_TEST_TOLERANCE: "40"
  URL_TEST_LAZY: "false"
  FILTER_MAX_DELAY_FOR_OUTPUT: "false"
  OPENCLASH_KEEP_META_OPTIONS: "false"
  OPENCLASH_ADD_LAN_DIRECT: "false"
  ENABLE_PERFORMANCE_OPTIONS: "false"

  MANUAL_INPUT_FILES: "input/links.txt,input.txt,links.txt"
  MANUAL_SERVER_OVERRIDE: "104.17.3.81"
  MANUAL_SERVER_OVERRIDE_TYPES: "cdn-compatible"
  SMART_SAFE_MANUAL_ONLY: "true"
  DROP_PROXY_TYPES: "ss,ssr"
  DISABLE_EXTRA_SS_SSR_SCAN: "true"

  ENABLE_RULE_FOCUS: "false"
  ENABLE_SMART_QOS: "false"
  ENABLE_INPUT_VMESS_LB: "false"
  ENABLE_CLEAN_RESPONSIVE_RULES: "false"
  ENABLE_STRICT_SAFE_FIX: "false"
  ENABLE_APP_AWARE_GROUPS: "true"
  ENABLE_GAME_BLOCK_INLINE_SAFE: "true"
  APP_AWARE_INTERVAL: "90"
  APP_AWARE_TOLERANCE: "40"
  APP_AWARE_MAX_CANDIDATES: "20"

  SOURCE_CACHE_ENABLE: "true"
  SOURCE_CACHE_DIR: "output/Cache/sources"
  USE_PREVIOUS_OUTPUT_IF_EMPTY: "true"
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: "true"
  PREVIOUS_OUTPUT_DIR: ".previous_output"
  BLACKLIST_FILE: "blacklist.txt"
  CUSTOM_RULES_FILE: "rules/custom_rules.yaml"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  update:
    name: Generate app-aware strict-safe OpenClash output
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests streamlit pyyaml
          fi

      - name: Backup previous output for fallback
        run: |
          set -e
          rm -rf .previous_output
          mkdir -p .previous_output
          if [ -d output ]; then
            cp -a output/. .previous_output/
            echo "Previous output backup file count:"
            find .previous_output -type f | wc -l
          fi

      - name: Generate OpenClash output
        run: |
          set -e
          if [ ! -f telegram_openclash_alive.py ]; then
            echo "ERROR: telegram_openclash_alive.py tidak ditemukan di root repository."
            exit 1
          fi
          python telegram_openclash_alive.py \
            --mode "$MODE" \
            --enable-proxy-test "$ENABLE_PROXY_TEST" \
            --filter-alive-only "$FILTER_ALIVE_ONLY" \
            --strict-alive-only "$STRICT_ALIVE_ONLY" \
            --test-rounds "$TEST_ROUNDS" \
            --require-success-rounds "$REQUIRE_SUCCESS_ROUNDS" || {
              echo "Gagal dengan argumen CLI. Coba fallback tanpa argumen."
              python telegram_openclash_alive.py
            }
          find output -maxdepth 3 -type f | sort || true

      - name: Apply smart-safe manual input and drop SS/SSR
        run: |
          set -e
          if [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --root .
            cat output/Validation/smart_safe_report.json || true
          else
            echo "WARNING: smart-safe responsive script tidak ditemukan; lanjut ke app-aware finalizer."
          fi

      - name: Apply app-aware strict-safe groups
        if: env.ENABLE_APP_AWARE_GROUPS == 'true'
        run: |
          set -e
          if [ ! -f scripts/apply_openclash_app_aware_groups.py ]; then
            echo "ERROR: scripts/apply_openclash_app_aware_groups.py tidak ditemukan."
            exit 1
          fi
          python scripts/apply_openclash_app_aware_groups.py \
            --root . \
            --interval "$APP_AWARE_INTERVAL" \
            --tolerance "$APP_AWARE_TOLERANCE" \
            --max-candidates "$APP_AWARE_MAX_CANDIDATES"
          cat output/Validation/app_aware_groups_report.json || true

      - name: Apply inline-safe game block rules
        if: env.ENABLE_GAME_BLOCK_INLINE_SAFE == 'true'
        run: |
          set -e
          if [ ! -f scripts/apply_openclash_game_block_inline_safe.py ]; then
            echo "ERROR: scripts/apply_openclash_game_block_inline_safe.py tidak ditemukan."
            exit 1
          fi
          python scripts/apply_openclash_game_block_inline_safe.py --root .
          cat output/Validation/game_block_inline_safe_report.json || true

      - name: Validate output exists
        run: |
          set -e
          if [ ! -f output/lengkap.yaml ]; then
            echo "ERROR: output/lengkap.yaml tidak ditemukan setelah generate."
            find output -maxdepth 4 -type f | sort || true
            exit 1
          fi
          test -f output/Validation/app_aware_groups_report.json
          test -f output/Validation/game_block_inline_safe_report.json
          wc -l output/lengkap.yaml || true

      - name: Validate OpenClash YAML
        run: |
          set -e
          python scripts/validate_openclash_outputs.py \
            output/lengkap.yaml \
            output/lengkap_alive.yaml \
            output/strict_alive.yaml \
            output/lite.yaml \
            output/fast.yaml \
            output/manual_only.yaml

      - name: Validate inline-safe game block
        if: env.ENABLE_GAME_BLOCK_INLINE_SAFE == 'true'
        run: |
          set -e
          python scripts/validate_game_block_inline_safe.py \
            --root . \
            output/lengkap.yaml \
            output/lengkap_alive.yaml \
            output/strict_alive.yaml \
            output/lite.yaml \
            output/fast.yaml \
            output/manual_only.yaml
          cat output/Validation/game_block_inline_safe_validation.json || true

      - name: Force output update marker
        if: env.FORCE_OUTPUT_COMMIT == 'true'
        run: |
          set -e
          python scripts/force_output_update_marker.py --root .
          cat output/Validation/last_run.json || true

      - name: Assert latest app-aware output features
        run: |
          set -e
          python scripts/assert_latest_openclash_outputs.py --root . --strict

      - name: Show generated output snapshot
        run: |
          set -e
          echo "Output YAML files:"
          find output -maxdepth 1 -type f -name "*.yaml" -printf "%f\n" | sort || true
          echo "Validation reports:"
          ls -la output/Validation || true
          echo "App-aware and game-block groups in fast.yaml:"
          grep -E "name: PROXY|name: UTAMA|name: AUTO|name: FALLBACK|name: GOOGLE|name: YOUTUBE|name: REDDIT|name: LINKEDIN|name: BLIBLI|name: BANK|name: MARKETPLACE|name: SOCIAL|name: DEFAULT|name: BLOCK" output/fast.yaml | head -180 || true
          echo "Inline game block rules in fast.yaml:"
          grep -E "DOMAIN-SUFFIX,(steampowered|epicgames|riotgames|roblox|pubgmobile|mobilelegends|freefiremobile|poki)" output/fast.yaml | head -80 || true
          echo "Ensure no unsupported provider/group types:"
          grep -R "RULE-SET,GAME-BLOCK" output/*.yaml && exit 1 || true
          grep -R "GAME-BLOCK-DOMAIN" output/*.yaml && exit 1 || true
          grep -R "GAME-BLOCK-CLASSICAL" output/*.yaml && exit 1 || true
          grep -R "type: load-balance" output/*.yaml && exit 1 || true
          grep -R "type: relay" output/*.yaml && exit 1 || true

      - name: Commit output files
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-main}"
          BACKUP_DIR="$(mktemp -d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -d output ]; then
            echo "ERROR: Folder output tidak ditemukan."
            exit 1
          fi
          echo "Backup output hasil generate ke folder sementara."
          tar -C output -cf "$BACKUP_DIR/output.tar" .
          if [ -d cache ]; then
            tar -C cache -cf "$BACKUP_DIR/cache.tar" .
          fi

          stage_generated_paths() {
            git add -A -f output
            if [ -d cache ]; then
              git add -A -f cache
            else
              echo "Folder cache tidak ada, skip git add cache."
            fi
          }

          write_force_marker() {
            mkdir -p output/Validation
            FORCE_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            FORCE_NONCE="$(date -u +%s%N)-${GITHUB_RUN_ID:-run}-${GITHUB_RUN_ATTEMPT:-attempt}-${GITHUB_RUN_NUMBER:-number}-$RANDOM"
            cat > output/Validation/last_run.json <<EOF
          {
            "status": "generated",
            "timestamp_utc": "$FORCE_TS",
            "nonce": "$FORCE_NONCE",
            "workflow": "${GITHUB_WORKFLOW:-Update OpenClash}",
            "mode": "${MODE:-update}",
            "source": "${SOURCE:-workflow}",
            "policy": "app-aware-strict-safe-inline-game-block"
          }
          EOF
            cat > output/Validation/last_run.txt <<EOF
          status: generated
          timestamp_utc: $FORCE_TS
          nonce: $FORCE_NONCE
          workflow: ${GITHUB_WORKFLOW:-Update OpenClash}
          mode: ${MODE:-update}
          source: ${SOURCE:-workflow}
          policy: app-aware-strict-safe-inline-game-block
          EOF
          }

          for attempt in 1 2 3; do
            echo "Commit/push attempt $attempt untuk branch: $BRANCH"
            git fetch origin "$BRANCH" || true
            git checkout "$BRANCH" || git checkout -B "$BRANCH" "origin/$BRANCH" || true
            git reset --hard "origin/$BRANCH" || true
            git clean -fd || true

            echo "Restore output hasil generate ke working tree terbaru."
            rm -rf output
            mkdir -p output
            tar -C output -xf "$BACKUP_DIR/output.tar"
            if [ -f "$BACKUP_DIR/cache.tar" ]; then
              rm -rf cache
              mkdir -p cache
              tar -C cache -xf "$BACKUP_DIR/cache.tar"
            fi

            stage_generated_paths
            if git diff --cached --quiet; then
              echo "Tidak ada perubahan output dari generator. Membuat force marker."
              write_force_marker
              stage_generated_paths
            fi

            git status --short output cache || true
            if git diff --cached --quiet; then
              echo "ERROR: marker tidak menghasilkan perubahan staging."
              exit 1
            fi

            git commit -m "Update app-aware output with inline game block"
            if git push origin "HEAD:$BRANCH"; then
              echo "Push berhasil."
              exit 0
            fi
            echo "Push gagal karena remote berubah. Ulangi."
            sleep 5
          done
          echo "Push tetap gagal setelah 3 percobaan."
          exit 1

      - name: Notify Telegram
        if: always()
        run: |
          if [ -f tools/telegram_notify.py ]; then
            if [ "${{ job.status }}" = "success" ]; then
              python tools/telegram_notify.py --stage success || true
            else
              python tools/telegram_notify.py --stage failure || true
            fi
          fi
