name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Sumber pemicu workflow (streamlit/telegram/manual/schedule)
        required: false
        default: manual
        type: string
      mode:
        description: Mode proses
        required: true
        default: update
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
          - build_ready
          - sanitize_import
          - optimize_openclash
          - purpose_groups
      enable_proxy_test:
        description: Jalankan test proxy
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      filter_alive_only:
        description: Filter output otomatis hanya alive
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      strict_alive_only:
        description: Strict alive only
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: update-openclash-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install pyyaml requests qrcode[pil] pillow

      - name: Generate OpenClash outputs if needed
        if: ${{ github.event_name == 'schedule' || (github.event.inputs.mode != 'optimize_openclash' && github.event.inputs.mode != 'purpose_groups' && github.event.inputs.mode != 'build_ready' && github.event.inputs.mode != 'sanitize_import') }}
        env:
          MODE: ${{ github.event.inputs.mode || 'update' }}
          ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
          FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
          STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          if [ -f scripts/telegram_openclash_alive.py ]; then
            python scripts/telegram_openclash_alive.py
          elif [ -f scripts/generate_configs.py ]; then
            python scripts/generate_configs.py
          elif [ -f scripts/generate_configs_basic.py ]; then
            python scripts/generate_configs_basic.py
          else
            echo "No generator script found. Skipping generate step."
          fi

      - name: Merge trusted input links into OpenClash YAML
        run: |
          set -e
          if [ -f scripts/merge_links_into_openclash_yaml.py ]; then
            python scripts/merge_links_into_openclash_yaml.py || true
          else
            echo "merge_links_into_openclash_yaml.py not found; skip."
          fi

      - name: Fix YAML group references
        run: |
          set -e
          if [ -f scripts/fix_yaml_group_refs.py ]; then
            python scripts/fix_yaml_group_refs.py || true
          else
            echo "fix_yaml_group_refs.py not found; skip."
          fi

      - name: Apply OpenClash anti-bengong optimization
        run: |
          set -e
          if [ -f scripts/apply_openclash_no_bengong.py ]; then
            python scripts/apply_openclash_no_bengong.py --max-stable 10
            cat output/Validation/summary_openclash_no_bengong.json || true
          elif [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --max-stable 10
            cat output/Validation/summary_openclash_responsive_stability.json || true
          else
            echo "No anti-bengong/responsive script found; skip."
          fi

      - name: Add best-link and fallback-link groups
        run: |
          set -e
          if [ -f scripts/add_best_link_group.py ]; then
            python scripts/add_best_link_group.py || true
          fi
          if [ -f scripts/add_input_fallback_group.py ]; then
            python scripts/add_input_fallback_group.py || true
          fi

      - name: Apply purpose-specific OpenClash groups and rules
        run: |
          set -e
          if [ -f scripts/apply_openclash_purpose_groups.py ]; then
            python scripts/apply_openclash_purpose_groups.py \
              --max-per-group 15 \
              --max-indonesia 20 \
              --tolerance 80

            echo "Purpose group summary:"
            cat output/Validation/summary_purpose_groups.json || true
          else
            echo "apply_openclash_purpose_groups.py not found; skip."
          fi

      - name: Validate OpenClash outputs
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py
          else
            echo "No OpenClash validator found; skip."
          fi

      - name: Build final sing-box profiles
        run: |
          set -e
          if [ -f scripts/build_singbox_final.py ]; then
            python scripts/build_singbox_final.py --link-input input/links.txt || true
          fi
          if [ -f scripts/build_best_stable.py ]; then
            python scripts/build_best_stable.py || true
          fi
          if [ -f scripts/sanitize_singbox_import.py ]; then
            python scripts/sanitize_singbox_import.py || true
          fi
          if [ -f scripts/enforce_trusted_manual_accounts.py ]; then
            python scripts/enforce_trusted_manual_accounts.py || true
          fi
          if [ -f scripts/fix_singbox_dependencies.py ]; then
            python scripts/fix_singbox_dependencies.py || true
          fi
          if [ -f scripts/remove_selector_default_legacy.py ]; then
            python scripts/remove_selector_default_legacy.py || true
          fi
          if [ -f scripts/fix_tun_address_modern.py ]; then
            python scripts/fix_tun_address_modern.py || true
          fi
          if [ -f scripts/build_final_ready_profiles.py ]; then
            python scripts/build_final_ready_profiles.py || true
          fi

      - name: Commit output files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output .github/workflows/update-openclash.yml scripts || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update purpose-specific OpenClash profiles"
            git push
          fi
