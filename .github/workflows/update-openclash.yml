name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Sumber pemicu workflow (streamlit/telegram/manual/schedule)
        required: false
        default: manual
        type: string
      mode:
        description: Mode proses
        required: true
        default: update
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
          - build_stable
          - clear_quarantine
          - sanitize_import
          - optimize_openclash
          - purpose_groups
          - build_ready
          - diagnostics
          - rollback_latest_good
          - build_v2raybox
      enable_proxy_test:
        description: Jalankan test proxy/ping untuk sumber otomatis
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      filter_alive_only:
        description: lengkap.yaml hanya berisi proxy hidup dari sumber otomatis
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      strict_alive_only:
        description: Pakai hanya akun sumber otomatis yang lolos URL delay test beberapa ronde
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: update-openclash-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: '1'
  MODE: ${{ github.event.inputs.mode || 'update' }}
  RUN_MODE: ${{ github.event.inputs.mode || 'update' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}

  # Generator tuning. These are safe defaults used by the existing generator when supported.
  TEST_ROUNDS: '2'
  REQUIRE_SUCCESS_ROUNDS: '1'
  STRICT_MAX_DELAY_MS: '8000'
  STRICT_OUTPUT_FILE: 'strict_alive.yaml'
  TCP_FALLBACK: 'true'
  DISABLE_TCP_ONLY_OUTPUT: 'false'
  STRICT_FALLBACK_TO_ALIVE: 'true'
  STRICT_FALLBACK_TO_VALID: 'true'

  BEST_PING_TOP_N: '10'
  BEST_PING_COUNTRY_FILTER: 'ID'
  BEST_PING_URL_TEST_NAME: 'URL-TEST TOP 10 INDONESIA'
  BEST_PING_BALANCE_ENABLE: 'true'

  URL_TEST_INTERVAL: '300'
  URL_TEST_TOLERANCE: '80'
  URL_TEST_LAZY: 'true'
  MAX_DELAY_MS: '8000'
  FILTER_MAX_DELAY_FOR_OUTPUT: 'false'

  BLACKLIST_FILE: 'blacklist.txt'
  SOURCE_CACHE_ENABLE: 'true'
  SOURCE_CACHE_DIR: 'output/Cache/sources'
  USE_PREVIOUS_OUTPUT_IF_EMPTY: 'true'
  FAST_REUSE_WHEN_NO_SOURCE_CHANGE: 'true'
  PREVIOUS_OUTPUT_DIR: '.previous_output'

  LITE_OUTPUT_FILE: 'lite.yaml'
  LITE_GLOBAL_TOP_N: '10'
  LITE_MAX_TOTAL: '25'

  ENABLE_USAGE_RULES: 'true'
  ENABLE_DEFAULT_RULES: 'true'
  ENABLE_PROFILE_RULES: 'true'

  RESPONSIVE_MAX_AVG_DELAY_MS: '8000'
  RESPONSIVE_MAX_JITTER_MS: '5000'
  RESPONSIVE_MIN_SUCCESS_RATE: '0.50'
  RESPONSIVE_TOP_N: '20'
  RESPONSIVE_COMBINED_MAX: '40'

  FAST_OUTPUT_FILE: 'fast.yaml'
  FAST_MAX_TOTAL: '20'
  FAST_FALLBACK_NAME: 'FALLBACK CEPAT'
  ENABLE_FAST_FALLBACK_GROUP: 'true'
  ENABLE_PERFORMANCE_OPTIONS: 'true'

  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    name: Build stable OpenClash and sing-box outputs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Show debug info
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Branch: ${GITHUB_REF_NAME:-main}"
          echo "Mode: $MODE"
          echo "Source: ${{ github.event.inputs.source || 'schedule/manual' }}"
          echo "Trusted manual links: input/links.txt and input.txt are appended without alive/dead validation."
          ls -la

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pyyaml requests qrcode[pil] pillow

      - name: Backup previous output for diff and rollback
        run: |
          set -e
          rm -rf .previous_output
          mkdir -p .previous_output
          if [ -d output ]; then
            cp -a output/. .previous_output/ || true
            echo "Previous output files:"
            find .previous_output -type f | wc -l
          else
            echo "No previous output directory."
          fi

      - name: Restore latest-good backup
        if: ${{ env.MODE == 'rollback_latest_good' }}
        run: |
          set -e
          python scripts/manage_latest_good_backup.py --restore

      - name: Clear health quarantine
        if: ${{ env.MODE == 'clear_quarantine' }}
        run: |
          set -e
          if [ -f scripts/clear_health_quarantine.py ]; then
            python scripts/clear_health_quarantine.py
          else
            mkdir -p output/Health
            echo 'name,reason,created_at' > output/Health/quarantine.csv
            echo '{"ok": true, "note": "quarantine cleared by workflow fallback"}' > output/Health/summary_clear_quarantine.json
          fi

      - name: Generate OpenClash outputs from automatic sources
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_ready' && env.MODE != 'optimize_openclash' && env.MODE != 'purpose_groups' && env.MODE != 'build_stable' && env.MODE != 'merge_links' }}
        run: |
          set -e
          if [ -f telegram_openclash_alive.py ]; then
            echo "Running root telegram_openclash_alive.py"
            python telegram_openclash_alive.py \
              --mode "$MODE" \
              --enable-proxy-test "$ENABLE_PROXY_TEST" \
              --filter-alive-only "$FILTER_ALIVE_ONLY" \
              --strict-alive-only "$STRICT_ALIVE_ONLY" \
              --test-rounds "$TEST_ROUNDS" \
              --require-success-rounds "$REQUIRE_SUCCESS_ROUNDS" || python telegram_openclash_alive.py
          elif [ -f scripts/telegram_openclash_alive.py ]; then
            echo "Running scripts/telegram_openclash_alive.py"
            python scripts/telegram_openclash_alive.py || true
          elif [ -f scripts/generate_configs.py ]; then
            echo "Running scripts/generate_configs.py"
            RUN_MODE="$MODE" python scripts/generate_configs.py
          elif [ -f scripts/generate_configs_basic.py ]; then
            echo "Running scripts/generate_configs_basic.py"
            python scripts/generate_configs_basic.py
          else
            echo "No generator found. Existing output will be reused."
          fi
          find output -maxdepth 4 -type f | sort || true

      - name: Merge trusted input links into OpenClash YAML
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/merge_links_into_openclash_yaml.py ]; then
            python scripts/merge_links_into_openclash_yaml.py || true
          else
            echo "merge_links_into_openclash_yaml.py not found; skip."
          fi

      - name: Fix YAML group references
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/fix_yaml_group_refs.py ]; then
            python scripts/fix_yaml_group_refs.py || true
            cat output/Validation/group_ref_fix_report.json || true
          fi

      - name: Apply OpenClash anti-bengong optimization
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_no_bengong.py ]; then
            python scripts/apply_openclash_no_bengong.py --max-stable 10
            cat output/Validation/summary_openclash_no_bengong.json || true
          elif [ -f scripts/apply_openclash_responsive_stability.py ]; then
            python scripts/apply_openclash_responsive_stability.py --max-stable 10
            cat output/Validation/summary_openclash_responsive_stability.json || true
          fi

      - name: Add trusted manual best-link and fallback-link groups
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/add_best_link_group.py ]; then
            python scripts/add_best_link_group.py || true
          fi
          if [ -f scripts/add_input_fallback_group.py ]; then
            python scripts/add_input_fallback_group.py || true
          fi

      - name: Route Indonesian connections to best Indonesian proxy
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_indonesia_best_proxy.py ]; then
            python scripts/apply_openclash_indonesia_best_proxy.py --max-indonesia 10 || true
            cat output/Validation/summary_indonesia_best_proxy.json || true
          fi

      - name: Apply purpose-specific OpenClash groups and rules
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/apply_openclash_purpose_groups.py ]; then
            python scripts/apply_openclash_purpose_groups.py \
              --max-per-group 15 \
              --max-indonesia 20 \
              --tolerance 80
            cat output/Validation/summary_purpose_groups.json || true
          fi

      - name: Validate OpenClash outputs
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' && env.MODE != 'sanitize_import' && env.MODE != 'build_stable' }}
        run: |
          set -e
          if [ -f scripts/validate_openclash_outputs.py ]; then
            python scripts/validate_openclash_outputs.py
          else
            echo "No OpenClash validator found; skip."
          fi

      - name: Build final sing-box profiles
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' }}
        run: |
          set -e
          if [ -f scripts/build_singbox_final.py ]; then
            python scripts/build_singbox_final.py --link-input input/links.txt || true
          fi
          if [ -f scripts/build_best_stable.py ]; then
            python scripts/build_best_stable.py || true
          fi
          if [ -f scripts/stabilize_singbox_mobile_idle.py ]; then
            python scripts/stabilize_singbox_mobile_idle.py || true
          fi
          if [ -f scripts/apply_dns_fallback_stable.py ]; then
            python scripts/apply_dns_fallback_stable.py || true
          fi
          if [ -f scripts/sanitize_singbox_import.py ]; then
            python scripts/sanitize_singbox_import.py || true
          fi
          if [ -f scripts/enforce_trusted_manual_accounts.py ]; then
            python scripts/enforce_trusted_manual_accounts.py || true
          fi
          if [ -f scripts/fix_singbox_dependencies.py ]; then
            python scripts/fix_singbox_dependencies.py || true
          fi
          if [ -f scripts/remove_selector_default_legacy.py ]; then
            python scripts/remove_selector_default_legacy.py || true
          fi
          if [ -f scripts/fix_tun_address_modern.py ]; then
            python scripts/fix_tun_address_modern.py || true
          fi
          if [ -f scripts/build_final_ready_profiles.py ]; then
            python scripts/build_final_ready_profiles.py || true
          fi

      - name: Build V2RayBox Android subscription outputs
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' && env.MODE != 'clear_quarantine' }}
        run: |
          set -e
          if [ -f scripts/build_v2raybox_outputs.py ]; then
            python scripts/build_v2raybox_outputs.py
            cat output/V2RayBox/summary_v2raybox.json || true
          else
            echo "build_v2raybox_outputs.py not found; skip."
          fi

      - name: Update node score history
        if: ${{ env.MODE != 'rollback_latest_good' }}
        run: |
          set -e
          python scripts/update_node_score_history.py

      - name: Build config diff report
        if: ${{ env.MODE != 'rollback_latest_good' }}
        run: |
          set -e
          python scripts/build_config_diff_report.py
          cat output/Final/diff_report.md || true

      - name: Save latest-good backup if current output is healthy
        if: ${{ env.MODE != 'rollback_latest_good' && env.MODE != 'diagnostics' }}
        run: |
          set -e
          python scripts/manage_latest_good_backup.py --backup
          cat output/Backup/latest_good_summary.json || true

      - name: Build admin diagnostic summary
        if: always()
        run: |
          set -e
          python scripts/build_admin_diagnostic_summary.py || true
          cat output/Final/admin_diagnostic_summary.json || true

      - name: Commit output files
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output .github/workflows/update-openclash.yml scripts streamlit_app.py requirements.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update stable SumberYAML outputs and diagnostics"
            git push
          fi
