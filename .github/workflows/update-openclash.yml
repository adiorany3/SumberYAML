name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Trigger source
        required: false
        default: manual
      mode:
        description: update, test, test_ping, atau update_ping
        required: false
        default: update
      enable_proxy_test:
        description: Jalankan test proxy/ping
        required: false
        default: "true"
      filter_alive_only:
        description: lengkap.yaml hanya berisi proxy hidup
        required: false
        default: "true"
      strict_alive_only:
        description: Pakai hanya akun yang lolos URL delay test beberapa ronde
        required: false
        default: "true"
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: openclash-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  MODE: ${{ github.event.inputs.mode || 'update' }}
  ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
  FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
  STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}
  TEST_ROUNDS: "3"
  REQUIRE_SUCCESS_ROUNDS: "3"
  STRICT_MAX_DELAY_MS: "3000"
  STRICT_OUTPUT_FILE: "strict_alive.yaml"
  TCP_FALLBACK: "false"
  DISABLE_TCP_ONLY_OUTPUT: "true"
  BEST_PING_TOP_N: "5"
  BEST_PING_COUNTRY_FILTER: "ID"
  BEST_PING_URL_TEST_NAME: "URL-TEST TOP 5 INDONESIA"
  MAX_DELAY_MS: "3000"
  FILTER_MAX_DELAY_FOR_OUTPUT: "true"
  BLACKLIST_FILE: "blacklist.txt"
  SOURCE_CACHE_ENABLE: "true"
  SOURCE_CACHE_DIR: "output/Cache/sources"
  LITE_OUTPUT_FILE: "lite.yaml"
  LITE_GLOBAL_TOP_N: "10"
  LITE_MAX_TOTAL: "25"
  CUSTOM_RULES_FILE: "rules/custom_rules.yaml"
  RANK_TCP_FALLBACK_PENALTY: "300"
  RANK_GLOBAL_FALLBACK_PENALTY: "1000"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  update:
    name: Generate, test, and commit OpenClash output
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Show debug info
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Ref: $GITHUB_REF"
          echo "Mode: $MODE"
          echo "Enable proxy test: $ENABLE_PROXY_TEST"
          echo "Filter alive only: $FILTER_ALIVE_ONLY"
          echo "Strict alive only: $STRICT_ALIVE_ONLY"
          echo "Test rounds: $TEST_ROUNDS"
          echo "Require success rounds: $REQUIRE_SUCCESS_ROUNDS"
          echo "Files in root:"
          ls -la
          echo "Workflow files:"
          ls -la .github/workflows || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests streamlit pyyaml
          fi

      - name: Generate OpenClash output
        run: |
          set -e
          if [ ! -f telegram_openclash_alive.py ]; then
            echo "ERROR: telegram_openclash_alive.py tidak ditemukan di root repository."
            echo "Pastikan semua file dari ZIP sudah diupload ke root repo."
            exit 1
          fi

          echo "Menjalankan telegram_openclash_alive.py..."
          python telegram_openclash_alive.py             --mode "$MODE"             --enable-proxy-test "$ENABLE_PROXY_TEST"             --filter-alive-only "$FILTER_ALIVE_ONLY"             --strict-alive-only "$STRICT_ALIVE_ONLY"             --test-rounds "$TEST_ROUNDS"             --require-success-rounds "$REQUIRE_SUCCESS_ROUNDS" || {
              echo "Gagal dengan argumen CLI. Coba fallback tanpa argumen..."
              python telegram_openclash_alive.py
            }

          echo "Output directory:"
          find output -maxdepth 3 -type f | sort || true

      - name: Validate output exists
        run: |
          if [ ! -f output/lengkap.yaml ]; then
            echo "ERROR: output/lengkap.yaml tidak ditemukan setelah generate."
            echo "Isi folder output:"
            find output -maxdepth 4 -type f | sort || true
            exit 1
          fi
          echo "OK: output/lengkap.yaml ditemukan"
          wc -l output/lengkap.yaml || true

      - name: Validate OpenClash YAML
        run: |
          set -e
          python scripts/validate_openclash_outputs.py output/lengkap.yaml output/lengkap_alive.yaml output/strict_alive.yaml output/lite.yaml

      - name: Commit output files
        run: |
          set -e
          BRANCH="${GITHUB_REF_NAME:-main}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Sinkronisasi branch sebelum commit: $BRANCH"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH" || git checkout -B "$BRANCH" "origin/$BRANCH"

          # Ambil perubahan terbaru dari remote sebelum menambahkan output.
          # Ini mencegah error: rejected / fetch first / non-fast-forward.
          git pull --rebase --autostash origin "$BRANCH"

          git add output || true
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan output untuk di-commit."
            exit 0
          fi

          git commit -m "Update OpenClash output"

          # Retry push jika ada commit baru masuk beberapa detik sebelum push.
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            if git push origin "HEAD:$BRANCH"; then
              echo "Push berhasil."
              exit 0
            fi

            echo "Push gagal karena remote berubah. Rebase ulang lalu coba lagi..."
            git fetch origin "$BRANCH"
            git pull --rebase --autostash origin "$BRANCH" || {
              echo "Rebase gagal. Abort rebase lalu keluar agar output tidak memaksa overwrite remote."
              git rebase --abort || true
              exit 1
            }
            sleep 5
          done

          echo "Push tetap gagal setelah 3 percobaan."
          exit 1

      - name: Notify Telegram
        if: always()
        run: |
          if [ -f tools/telegram_notify.py ]; then
            if [ "${{ job.status }}" = "success" ]; then
              python tools/telegram_notify.py --stage success || true
            else
              python tools/telegram_notify.py --stage failure || true
            fi
          else
            echo "tools/telegram_notify.py tidak ditemukan, skip notify."
          fi
