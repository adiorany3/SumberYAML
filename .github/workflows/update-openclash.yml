name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Sumber pemicu workflow
        required: false
        default: manual
        type: string
      mode:
        description: Mode proses
        required: true
        default: update
        type: choice
        options:
          - update
          - update_ping
          - test
          - test_ping
          - merge_links
          - build_stable
          - clear_quarantine
          - sanitize_import
          - optimize_openclash
          - purpose_groups
          - adblock
          - security_block
          - game_block
          - build_ready
          - diagnostics
          - rollback_latest_good
          - build_v2raybox
          - build_nekobox
      enable_proxy_test:
        description: Jalankan test proxy
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      filter_alive_only:
        description: Filter output utama hanya proxy alive
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      strict_alive_only:
        description: Buat strict alive output
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  actions: read

concurrency:
  group: sumberyaml-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MODE: ${{ github.event.inputs.mode || 'update' }}
      SOURCE: ${{ github.event.inputs.source || 'schedule' }}
      ENABLE_PROXY_TEST: ${{ github.event.inputs.enable_proxy_test || 'true' }}
      FILTER_ALIVE_ONLY: ${{ github.event.inputs.filter_alive_only || 'true' }}
      STRICT_ALIVE_ONLY: ${{ github.event.inputs.strict_alive_only || 'true' }}
      BEST_PING_TOP_N: '10'
      BEST_PING_COUNTRY_FILTER: 'ID'
      BEST_PING_URL_TEST_NAME: 'URL-TEST TOP 10 INDONESIA'
      URL_TEST_INTERVAL: '300'
      URL_TEST_TOLERANCE: '80'
      URL_TEST_LAZY: 'true'
      RESPONSIVE_TOP_N: '20'
      RESPONSIVE_COMBINED_MAX: '40'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync remote branch before build
        run: |
          set -e
          git fetch origin "${GITHUB_REF_NAME}"
          git merge --ff-only "origin/${GITHUB_REF_NAME}" || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install requests pyyaml qrcode[pil] pillow

      - name: Prepare output directories
        run: |
          mkdir -p output output/RuleProviders output/Validation output/SingBox output/V2RayBox output/NekoBox output/Final output/Health output/Backup

      - name: Generate OpenClash base outputs
        if: ${{ contains(fromJson('["update","update_ping","test","test_ping"]'), env.MODE) }}
        run: |
          set -e
          if [ -f telegram_openclash_alive.py ]; then
            python telegram_openclash_alive.py
          elif [ -f scripts/generate_configs.py ]; then
            python scripts/generate_configs.py
          elif [ -f scripts/generate_configs_basic.py ]; then
            python scripts/generate_configs_basic.py
          else
            echo "No base OpenClash generator found; continuing with existing output files."
          fi

      - name: Merge trusted manual links into OpenClash YAML
        if: ${{ hashFiles('scripts/merge_links_into_openclash_yaml.py') != '' }}
        run: |
          set -e
          python scripts/merge_links_into_openclash_yaml.py || true

      - name: Fix OpenClash YAML group references
        if: ${{ hashFiles('scripts/fix_yaml_group_refs.py') != '' }}
        run: |
          set -e
          python scripts/fix_yaml_group_refs.py || true

      - name: Apply OpenClash no-bengong optimization
        if: ${{ hashFiles('scripts/apply_openclash_no_bengong.py') != '' && (env.MODE == 'update' || env.MODE == 'optimize_openclash') }}
        run: |
          set -e
          python scripts/apply_openclash_no_bengong.py --max-stable 10 || true

      - name: Apply responsive OpenClash stability
        if: ${{ hashFiles('scripts/apply_openclash_responsive_stability.py') != '' && (env.MODE == 'update' || env.MODE == 'optimize_openclash') }}
        run: |
          set -e
          python scripts/apply_openclash_responsive_stability.py --max-stable 10 || true

      - name: Apply purpose-specific groups
        if: ${{ hashFiles('scripts/apply_openclash_purpose_groups.py') != '' && (env.MODE == 'update' || env.MODE == 'purpose_groups' || env.MODE == 'optimize_openclash') }}
        run: |
          set -e
          python scripts/apply_openclash_purpose_groups.py --max-per-group 15 --max-indonesia 20 --tolerance 80 || true

      - name: Apply Indonesian best proxy rules
        if: ${{ hashFiles('scripts/apply_openclash_indonesia_best_proxy.py') != '' && (env.MODE == 'update' || env.MODE == 'purpose_groups' || env.MODE == 'optimize_openclash') }}
        run: |
          set -e
          python scripts/apply_openclash_indonesia_best_proxy.py --max-indonesia 10 || true

      - name: Apply best-link group
        if: ${{ hashFiles('scripts/add_best_link_group.py') != '' }}
        run: |
          set -e
          python scripts/add_best_link_group.py || true

      - name: Apply fallback-link group
        if: ${{ hashFiles('scripts/add_input_fallback_group.py') != '' }}
        run: |
          set -e
          python scripts/add_input_fallback_group.py || true

      - name: Build final sing-box JSON and merge trusted input links
        if: ${{ hashFiles('scripts/build_singbox_final.py') != '' && env.MODE != 'rollback_latest_good' }}
        run: |
          set -e
          python scripts/build_singbox_final.py --link-input input/links.txt || true

      - name: Build best stable profiles
        if: ${{ hashFiles('scripts/build_best_stable.py') != '' && (env.MODE == 'update' || env.MODE == 'build_stable') }}
        run: |
          set -e
          python scripts/build_best_stable.py || true

      - name: Sanitize sing-box import profiles
        if: ${{ hashFiles('scripts/sanitize_singbox_import.py') != '' && (env.MODE == 'update' || env.MODE == 'sanitize_import') }}
        run: |
          set -e
          python scripts/sanitize_singbox_import.py || true

      - name: Fix sing-box dependencies
        if: ${{ hashFiles('scripts/fix_singbox_dependencies.py') != '' }}
        run: |
          set -e
          python scripts/fix_singbox_dependencies.py || true

      - name: Remove selector.default for legacy clients
        if: ${{ hashFiles('scripts/remove_selector_default_legacy.py') != '' }}
        run: |
          set -e
          python scripts/remove_selector_default_legacy.py || true

      - name: Fix modern TUN address fields
        if: ${{ hashFiles('scripts/fix_tun_address_modern.py') != '' }}
        run: |
          set -e
          python scripts/fix_tun_address_modern.py || true

      - name: Enforce trusted manual accounts
        if: ${{ hashFiles('scripts/enforce_trusted_manual_accounts.py') != '' }}
        run: |
          set -e
          python scripts/enforce_trusted_manual_accounts.py || true

      - name: Apply DNS fallback stable
        if: ${{ hashFiles('scripts/apply_dns_fallback_stable.py') != '' }}
        run: |
          set -e
          python scripts/apply_dns_fallback_stable.py || true

      - name: Build final ready profiles
        if: ${{ hashFiles('scripts/build_final_ready_profiles.py') != '' && (env.MODE == 'update' || env.MODE == 'build_ready') }}
        run: |
          set -e
          python scripts/build_final_ready_profiles.py || true

      - name: Build V2RayBox outputs
        if: ${{ hashFiles('scripts/build_v2raybox_outputs.py') != '' && (env.MODE == 'update' || env.MODE == 'build_v2raybox') }}
        run: |
          set -e
          python scripts/build_v2raybox_outputs.py || true

      - name: Build NekoBox outputs
        if: ${{ hashFiles('scripts/build_nekobox_outputs.py') != '' && (env.MODE == 'update' || env.MODE == 'build_nekobox') }}
        run: |
          set -e
          python scripts/build_nekobox_outputs.py || true

      - name: Apply YouTube GoodbyeAds provider
        if: ${{ hashFiles('scripts/apply_goodbyeads_youtube_provider.py') != '' && (env.MODE == 'update' || env.MODE == 'adblock') }}
        run: |
          set -e
          python scripts/apply_goodbyeads_youtube_provider.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" --url-source raw || true

      - name: Apply general adblock provider
        if: ${{ hashFiles('scripts/apply_openclash_general_adblock_provider.py') != '' && (env.MODE == 'update' || env.MODE == 'adblock') }}
        run: |
          set -e
          python scripts/apply_openclash_general_adblock_provider.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" --url-source raw || true

      - name: Apply game block provider
        if: ${{ hashFiles('scripts/apply_openclash_game_block_provider.py') != '' && (env.MODE == 'game_block') }}
        run: |
          set -e
          python scripts/apply_openclash_game_block_provider.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" --url-source raw || true

      - name: Apply Indonesia, Android, malware, and adware block providers
        if: ${{ env.MODE == 'update' || env.MODE == 'adblock' || env.MODE == 'security_block' }}
        run: |
          set -e
          python scripts/apply_openclash_indonesia_android_security_block.py \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --url-source raw \
            --max-indonesia 5000 \
            --max-android 12000 \
            --max-malware 50000 \
            --max-general 25000

          echo "Indonesia/Android/security block summary:"
          cat output/Validation/summary_indonesia_android_security_block.json || true

      - name: Force create base rule-provider files
        if: ${{ hashFiles('scripts/create_rule_provider_files.py') != '' && (env.MODE == 'update' || env.MODE == 'adblock' || env.MODE == 'security_block') }}
        run: |
          set -e
          python scripts/create_rule_provider_files.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true

      - name: Ensure all rule-providers are attached to final OpenClash YAML
        if: ${{ hashFiles('scripts/ensure_openclash_rule_providers_final.py') != '' && (env.MODE == 'update' || env.MODE == 'adblock' || env.MODE == 'security_block' || env.MODE == 'game_block') }}
        run: |
          set -e
          python scripts/ensure_openclash_rule_providers_final.py --repo "${{ github.repository }}" --branch "${{ github.ref_name }}" || true

      - name: Validate OpenClash outputs
        if: ${{ hashFiles('scripts/validate_openclash_outputs.py') != '' && env.MODE != 'rollback_latest_good' }}
        run: |
          set -e
          python scripts/validate_openclash_outputs.py || true

      - name: Build diagnostics
        if: ${{ hashFiles('scripts/build_admin_diagnostic_summary.py') != '' && (env.MODE == 'update' || env.MODE == 'diagnostics') }}
        run: |
          set -e
          python scripts/build_admin_diagnostic_summary.py || true

      - name: Build config diff report
        if: ${{ hashFiles('scripts/build_config_diff_report.py') != '' && (env.MODE == 'update' || env.MODE == 'diagnostics') }}
        run: |
          set -e
          python scripts/build_config_diff_report.py || true

      - name: Update node score history
        if: ${{ hashFiles('scripts/update_node_score_history.py') != '' && (env.MODE == 'update' || env.MODE == 'diagnostics') }}
        run: |
          set -e
          python scripts/update_node_score_history.py || true

      - name: Manage latest-good backup or rollback
        if: ${{ hashFiles('scripts/manage_latest_good_backup.py') != '' }}
        run: |
          set -e
          if [ "$MODE" = "rollback_latest_good" ]; then
            python scripts/manage_latest_good_backup.py --restore || true
          else
            python scripts/manage_latest_good_backup.py --backup || true
          fi

      - name: List rule provider output
        run: |
          echo "RuleProviders:"
          find output/RuleProviders -maxdepth 1 -type f -print | sort || true
          echo "Validation summaries:"
          find output/Validation -maxdepth 1 -type f -name '*provider*.json' -print | sort || true

      - name: Commit output files
        run: |
          set -e
          git add output || true
          git add .github/workflows/update-openclash.yml || true
          git add scripts || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update SumberYAML outputs, providers, and diagnostics"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt"
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "Push success"
              exit 0
            fi
            echo "Push failed; syncing remote and retrying..."
            git fetch origin "${GITHUB_REF_NAME}"
            git merge -X ours --no-edit "origin/${GITHUB_REF_NAME}" || true
            sleep $((attempt * 3))
          done
          echo "Push failed after retries."
          exit 1

      - name: Purge jsDelivr cache
        if: always()
        run: |
          set +e
          for file in \
            output/SingBox/mobile-stable-safe.json \
            output/SingBox/import-ready.json \
            output/openclash-ready.yaml \
            output/RuleProviders/youtube-ads.yaml \
            output/RuleProviders/goodbyeads-youtube.yaml \
            output/RuleProviders/general-ads.yaml \
            output/RuleProviders/indonesia-ads.yaml \
            output/RuleProviders/android-ads.yaml \
            output/RuleProviders/malware-adware.yaml \
            output/RuleProviders/game-block.yaml; do
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/$file" || true
          done

      - name: Notify Telegram
        if: always()
        run: |
          set +e
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          STATUS="${{ job.status }}"
          TEXT="SumberYAML workflow selesai.%0AMode: ${MODE}%0AStatus: ${STATUS}%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "parse_mode=HTML" || true
