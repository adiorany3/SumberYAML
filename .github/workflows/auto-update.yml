name: Update OpenClash

on:
  workflow_dispatch:
    inputs:
      source:
        description: Trigger source
        required: false
        default: manual
  schedule:
    # Auto update setiap 6 jam. Ubah sesuai kebutuhan.
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: openclash-update
  cancel-in-progress: false

jobs:
  update:
    name: Generate and commit OpenClash output
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate OpenClash files
        run: python telegram_openclash_bot.py

      - name: Validate output
        run: |
          test -f output/lengkap.yaml
          python - <<'PY'
          from pathlib import Path
          p = Path('output/lengkap.yaml')
          if p.stat().st_size < 20:
              raise SystemExit('output/lengkap.yaml terlalu kecil atau kosong')
          print(f'OK: {p} ({p.stat().st_size} bytes)')
          PY

      - name: Commit updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan output."
          else
            git commit -m "Update OpenClash output"
            git push
          fi

      - name: Notify Telegram success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SEND_OUTPUT_FILE: ${{ vars.TELEGRAM_SEND_OUTPUT_FILE || 'true' }}
        run: python tools/telegram_notify.py --stage success

      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tools/telegram_notify.py --stage failure
